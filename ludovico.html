<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ludovico IA | Veropred Analytics</title>

<style>
:root {
    --bg:#080706;
    --gold:#d8b06a;
    --copper:#c9783a;
    --cream:#f6efe3;
    --muted:#b9aa96;
    --line:rgba(255,255,255,.14);
}

* { box-sizing:border-box; }

body {
    margin:0;
    min-height:100vh;
    background:
        radial-gradient(circle at 20% 10%, rgba(201,120,58,.20), transparent 34%),
        radial-gradient(circle at 80% 18%, rgba(216,176,106,.10), transparent 34%),
        linear-gradient(135deg,#080706,#15100d 48%,#24160f);
    color:var(--cream);
    font-family:Inter, Arial, sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px;
}

.chat {
    width:min(420px,100%);
    height:620px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    border:1px solid var(--line);
    background:rgba(255,255,255,.055);
    border-radius:32px;
    box-shadow:0 28px 80px rgba(0,0,0,.42);
}

.chat-head {
    display:flex;
    align-items:center;
    gap:18px;
    padding:22px;
    border-bottom:1px solid var(--line);
    background:
        radial-gradient(circle at 18% 22%, rgba(216,176,106,.12), transparent 38%),
        rgba(255,255,255,.035);
}

.ludovico-avatar img {
    width:104px;
    height:104px;
    border-radius:28px;
    object-fit:cover;
    border:1px solid rgba(216,176,106,.38);
    box-shadow:
        0 0 34px rgba(216,176,106,.18),
        0 18px 42px rgba(0,0,0,.45);
}

.ludovico-info strong {
    color:var(--gold);
    display:block;
    font-size:18px;
}

.ludovico-info span {
    display:block;
    margin-top:6px;
    color:var(--muted);
    font-size:12px;
    line-height:1.35;
}

.messages {
    flex:1;
    overflow-y:auto;
    padding:18px;
    display:flex;
    flex-direction:column;
    gap:12px;
}

.msg {
    max-width:86%;
    padding:13px 15px;
    border-radius:18px;
    font-size:14px;
    line-height:1.45;
    white-space:pre-wrap;
}

.bot {
    align-self:flex-start;
    background:rgba(255,255,255,.075);
    color:#d7cbb9;
    border:1px solid rgba(255,255,255,.08);
}

.user {
    align-self:flex-end;
    background:rgba(216,176,106,.18);
    color:var(--cream);
    border:1px solid rgba(216,176,106,.22);
}

.input-area {
    display:flex;
    gap:10px;
    padding:16px;
    border-top:1px solid var(--line);
}

.input-area input {
    flex:1;
    min-width:0;
    border:1px solid var(--line);
    background:rgba(255,255,255,.08);
    color:var(--cream);
    border-radius:999px;
    padding:13px 15px;
    outline:none;
}

.input-area input::placeholder {
    color:rgba(246,239,227,.42);
}

.input-area button {
    border:0;
    border-radius:999px;
    padding:13px 18px;
    background:linear-gradient(135deg,#f0bf7a,#c9783a);
    color:#1a0f09;
    font-weight:800;
    cursor:pointer;
}

.chat-footer {
    padding:0 16px 18px;
}

.back {
    width:100%;
    display:flex;
    justify-content:center;
    color:var(--gold);
    text-decoration:none;
    border:1px solid rgba(216,176,106,.35);
    border-radius:999px;
    padding:12px 16px;
    background:rgba(216,176,106,.045);
    font-size:13px;
}

@media(max-width:520px) {
    body {
        padding:18px;
    }

    .chat {
        height:calc(100vh - 36px);
        border-radius:26px;
    }

    .ludovico-avatar img {
        width:82px;
        height:82px;
        border-radius:22px;
    }
}
</style>
</head>

<body>

<section class="chat">
    <div class="chat-head">
        <div class="ludovico-avatar">
            <img src="assets/ludovico_2.png" alt="Ludovico IA">
        </div>

        <div class="ludovico-info">
            <strong>Ludovico IA</strong>
            <span>Refinador de cenários para avaliação estratégica</span>
        </div>
    </div>

    <div class="messages" id="messages">
        <div class="msg bot">
            Descreva sua ideia como ela está hoje. Vou ajudar a deixá-la mais clara para envio do cenário.
        </div>
    </div>

    <div class="input-area">
        <input id="userInput" placeholder="Descreva sua ideia ou cenário inicial..." onkeydown="handleEnter(event)">
        <button onclick="sendMessage()">Enviar</button>
    </div>

    <div class="chat-footer">
        <a href="index.html" class="back">← Voltar ao site</a>
    </div>
</section>

<script>
const API_URL = ""; 
// Depois vamos colocar aqui a URL do backend, exemplo:
// const API_URL = "https://seu-backend.vercel.app/api/ludovico";

function addMessage(text, type) {
    const messages = document.getElementById("messages");
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.textContent = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

function mockLudovico(text) {
    return "Ainda estou em desenvolvimento, em breve terei essa capacidade de refinamento de cenários.";
}

async function sendMessage() {
    const input = document.getElementById("userInput");
    const text = input.value.trim();

    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    addMessage("Analisando aderência...", "bot");

    const messages = document.getElementById("messages");
    const loadingMsg = messages.lastChild;

    try {
        let reply;

        if (!API_URL) {
            reply = mockLudovico(text);
        } else {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ message: text })
            });

            const data = await response.json();
            reply = data.reply || "Não foi possível gerar uma resposta agora.";
        }

        loadingMsg.textContent = reply;

    } catch (error) {
        loadingMsg.textContent = "Não foi possível conectar ao Ludovico agora.";
    }
}

function handleEnter(event) {
    if (event.key === "Enter") {
        sendMessage();
    }
}
</script>

</body>
</html>
