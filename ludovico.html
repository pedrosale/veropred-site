<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ludovico IA | Veropred Analytics</title>

<style>
:root {
    --bg:#080706;
    --gold:#d8b06a;
    --copper:#c9783a;
    --cream:#f6efe3;
    --muted:#b9aa96;
    --line:rgba(255,255,255,.14);
}

* { box-sizing:border-box; }

body {
    margin:0;
    background:transparent;
    color:var(--cream);
    font-family:Inter, Arial, sans-serif;
}

/* CONTAINER */
.chat {
    width:100%;
    max-width:420px;
    min-height:420px;
    border:1px solid rgba(216,176,106,.28);
    background:
        radial-gradient(circle at 18% 18%, rgba(216,176,106,.10), transparent 36%),
        linear-gradient(145deg, #120d0a, #21150f 55%, #0b0806);
    border-radius:32px;
    box-shadow:0 28px 80px rgba(0,0,0,.46);
    overflow:hidden;
    color:#f6efe3;
}


.input-area input {
    flex:1;
    min-width:0;
    border:1px solid rgba(255,255,255,.14);
    background:rgba(255,255,255,.08);
    color:#f6efe3;
    border-radius:999px;
    padding:13px 15px;
    outline:none;
}

.input-area input::placeholder {
    color:rgba(246,239,227,.45);
}

.input-area button {
    border:0;
    border-radius:999px;
    padding:13px 18px;
    background:linear-gradient(135deg,#f0bf7a,#c9783a);
    color:#1a0f09;
    font-weight:800;
    cursor:pointer;
}

/* HEADER */
.chat-head {
    display:flex;
    align-items:center;
    gap:18px;
    padding:22px;
    border-bottom:1px solid var(--line);
    background:
        radial-gradient(circle at 18% 22%, rgba(216,176,106,.12), transparent 38%),
        rgba(255,255,255,.035);
}

.ludovico-avatar img {
    width:104px;
    height:104px;
    border-radius:28px;
    object-fit:cover;
    border:1px solid rgba(216,176,106,.38);
    box-shadow:
        0 0 34px rgba(216,176,106,.18),
        0 18px 42px rgba(0,0,0,.45);
}

.ludovico-info strong {
    color:var(--gold);
    display:block;
    font-size:18px;
}

.ludovico-info span {
    display:block;
    margin-top:6px;
    color:var(--muted);
    font-size:12px;
    line-height:1.35;
}

/* MESSAGES */
.messages {
    max-height:260px;
    overflow-y:auto;
    padding:18px;
    display:flex;
    flex-direction:column;
    gap:12px;
}

.msg {
    max-width:86%;
    padding:13px 15px;
    border-radius:18px;
    font-size:14px;
    line-height:1.45;
    white-space:pre-wrap;
}

.bot {
    align-self:flex-start;
    background:rgba(255,255,255,.075);
    color:#d7cbb9;
    border:1px solid rgba(255,255,255,.08);
}

.user {
    align-self:flex-end;
    background:rgba(216,176,106,.18);
    color:var(--cream);
    border:1px solid rgba(216,176,106,.22);
}

/* INPUT */
.input-area {
    display:flex;
    gap:10px;
    padding:16px;
    border-top:1px solid var(--line);
}

.input-area input {
    flex:1;
    min-width:0;
    border:1px solid var(--line);
    background:rgba(255,255,255,.08);
    color:var(--cream);
    border-radius:999px;
    padding:13px 15px;
    outline:none;
}

.input-area input::placeholder {
    color:rgba(246,239,227,.42);
}

.input-area button {
    border:0;
    border-radius:999px;
    padding:13px 18px;
    background:linear-gradient(135deg,#f0bf7a,#c9783a);
    color:#1a0f09;
    font-weight:800;
    cursor:pointer;
}

/* MOBILE */
@media(max-width:520px) {
    .chat {
        border-radius:26px;
    }

    .ludovico-avatar img {
        width:82px;
        height:82px;
        border-radius:22px;
    }
}
</style>
</head>

<body>

<section class="chat">
    
    <div class="chat-head">
        <div class="ludovico-avatar">
            <img src="assets/ludovico_2.png" alt="Ludovico IA">
        </div>

        <div class="ludovico-info">
            <strong>Ludovico IA</strong>
            <span>Refinador de cenários para avaliação estratégica</span>
        </div>
    </div>

    <div class="messages" id="messages">
        <div class="msg bot">
            Descreva sua ideia como ela está hoje. Vou ajudar a deixá-la mais clara para envio do cenário.
        </div>
    </div>

    <div class="input-area">
        <input id="userInput" placeholder="Descreva sua ideia ou cenário inicial..." onkeydown="handleEnter(event)">
        <button onclick="sendMessage()">Refinar</button>
    </div>

</section>

<script>
const API_URL = ""; // depois você coloca seu backend aqui

function addMessage(text, type) {
    const messages = document.getElementById("messages");
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.textContent = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

function mockLudovico(text) {
    return `Cenário inicial:
${text}

Ponto a avaliar:
A situação parece envolver uma decisão que ainda não está estruturada em termos de impacto, risco e critério.

Mensagem sugerida:
Gostaria de avaliar um cenário onde a decisão ainda não está suficientemente clara. O contexto envolve: ${text}

Busco uma leitura inicial sobre a aderência desse problema à atuação da Veropred.`;
}

async function sendMessage() {
    const input = document.getElementById("userInput");
    const text = input.value.trim();

    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    addMessage("Refinando cenário...", "bot");

    const messages = document.getElementById("messages");
    const loadingMsg = messages.lastChild;

    try {
        let reply;

        if (!API_URL) {
            reply = mockLudovico(text);
        } else {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ message: text })
            });

            const data = await response.json();
            reply = data.reply || "Não foi possível gerar uma resposta agora.";
        }

        loadingMsg.textContent = reply;

    } catch (error) {
        loadingMsg.textContent = "Erro ao conectar com o Ludovico.";
    }
}

function handleEnter(event) {
    if (event.key === "Enter") {
        sendMessage();
    }
}
</script>

</body>
</html>
