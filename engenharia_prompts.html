<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Veropred Engenharia de Prompts</title>

  <style>
    :root {
      --vp-bg: #070707;
      --vp-panel: #111111;
      --vp-panel-2: #171717;
      --vp-border: rgba(196, 137, 72, 0.35);
      --vp-gold: #d6a85f;
      --vp-copper: #b87333;
      --vp-text: #f3eee7;
      --vp-muted: #a9a39a;
      --vp-soft: #6f6a63;
      --vp-danger: #d08370;
      --vp-success: #c8a96a;
      --vp-graphite: #242424;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top right, rgba(184,115,51,0.20), transparent 34%),
        radial-gradient(circle at bottom left, rgba(214,168,95,0.10), transparent 28%),
        #050505;
      color: var(--vp-text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .page {
      width: min(1180px, 94vw);
      margin: 0 auto;
      padding: 30px 0 48px;
    }

    .vp-shell {
      background:
        radial-gradient(circle at top right, rgba(184,115,51,0.18), transparent 35%),
        linear-gradient(135deg, #050505 0%, #0c0c0c 50%, #111111 100%);
      border: 1px solid var(--vp-border);
      border-radius: 22px;
      padding: 28px;
      color: var(--vp-text);
      box-shadow: 0 24px 80px rgba(0,0,0,0.45);
      margin-bottom: 22px;
    }

    .vp-header {
      border-bottom: 1px solid rgba(214,168,95,0.25);
      padding-bottom: 20px;
      margin-bottom: 22px;
    }

    .vp-brand {
      font-size: 13px;
      letter-spacing: 0.18em;
      color: var(--vp-gold);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .vp-title {
      font-size: clamp(28px, 5vw, 42px);
      line-height: 1.08;
      font-weight: 650;
      color: var(--vp-text);
      margin: 0;
      letter-spacing: -0.035em;
    }

    .vp-subtitle {
      font-size: 16px;
      color: var(--vp-muted);
      margin-top: 10px;
      line-height: 1.55;
    }

    .vp-grid {
      display: grid;
      grid-template-columns: 1.25fr 0.75fr;
      gap: 20px;
      align-items: start;
    }

    .vp-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.045), rgba(255,255,255,0.018));
      border: 1px solid rgba(214,168,95,0.22);
      border-radius: 18px;
      padding: 22px;
      margin-bottom: 18px;
    }

    .vp-card h2 {
      margin: 0 0 12px 0;
      font-size: 22px;
      color: var(--vp-text);
      line-height: 1.25;
    }

    .vp-card h3,
    .vp-feedback h3 {
      margin: 0 0 10px 0;
      font-size: 16px;
      color: var(--vp-gold);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .vp-phase {
      display: inline-block;
      padding: 7px 11px;
      border: 1px solid rgba(214,168,95,0.32);
      border-radius: 999px;
      color: var(--vp-gold);
      background: rgba(214,168,95,0.08);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .vp-objective {
      color: var(--vp-muted);
      font-size: 14px;
      margin-bottom: 16px;
      line-height: 1.55;
    }

    .vp-chaos {
      background: #0a0a0a;
      border-left: 4px solid var(--vp-copper);
      border-radius: 14px;
      padding: 18px;
      color: #e8dfd3;
      font-size: 15px;
      line-height: 1.7;
      white-space: pre-wrap;
    }

    .vp-text {
      color: var(--vp-muted);
      line-height: 1.65;
      font-size: 15px;
    }

    .vp-structure {
      background: rgba(214,168,95,0.06);
      border: 1px solid rgba(214,168,95,0.20);
      border-radius: 14px;
      padding: 18px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      color: #eadcc6;
      font-size: 14px;
      line-height: 1.65;
      white-space: pre-wrap;
      overflow-x: auto;
    }

    .vp-list {
      margin: 8px 0 0 0;
      padding-left: 18px;
      color: var(--vp-muted);
      line-height: 1.65;
    }

    .vp-progress-wrap {
      background: #0a0a0a;
      border: 1px solid rgba(214,168,95,0.16);
      border-radius: 12px;
      height: 10px;
      overflow: hidden;
      margin-top: 6px;
    }

    .vp-progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #8a552b, #d6a85f);
      border-radius: 12px;
      transition: width 0.35s ease;
    }

    .vp-attr-row {
      margin-bottom: 14px;
    }

    .vp-attr-label {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--vp-muted);
    }

    .vp-status {
      font-size: 14px;
      color: var(--vp-muted);
      line-height: 1.6;
    }

    .vp-small {
      font-size: 12px;
      color: var(--vp-soft);
      line-height: 1.55;
    }

    .vp-divider {
      height: 1px;
      background: rgba(214,168,95,0.18);
      margin: 18px 0;
    }

    .vp-answer-title {
      color: var(--vp-gold);
      font-size: 14px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin: 12px 0 10px 0;
    }

    textarea {
      display: block;
      width: 100%;
      min-height: 300px;
      resize: vertical;
      background: #0b0b0b;
      color: #f0e8dc;
      border: 1px solid rgba(214,168,95,0.35);
      border-radius: 14px;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
      line-height: 1.55;
      padding: 16px;
      outline: none;
      margin-bottom: 14px;
    }

    textarea:focus {
      border-color: rgba(214,168,95,0.70);
      box-shadow: 0 0 0 3px rgba(214,168,95,0.08);
    }

    .vp-button-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    button {
      min-height: 46px;
      border-radius: 12px;
      border: 1px solid rgba(214,168,95,0.22);
      font-weight: 700;
      letter-spacing: 0.02em;
      padding: 0 18px;
      cursor: pointer;
      color: #111;
      background: var(--vp-gold);
      transition: transform 0.18s ease, opacity 0.18s ease, background 0.18s ease;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .btn-start { background: var(--vp-copper); color: #fff2df; width: 100%; }
    .btn-submit { background: var(--vp-gold); color: #17120a; }
    .btn-next { background: #8a552b; color: #fff2df; }
    .btn-restart { background: #242424; color: #f3eee7; }

    .vp-feedback {
      border-radius: 18px;
      padding: 20px;
      color: var(--vp-text);
      margin-top: 18px;
    }

    .vp-feedback-success {
      background: rgba(214,168,95,0.08);
      border: 1px solid rgba(214,168,95,0.35);
    }

    .vp-feedback-fail {
      background: rgba(208,131,112,0.08);
      border: 1px solid rgba(208,131,112,0.35);
    }

    .vp-feedback-title {
      color: var(--vp-gold);
      font-size: 18px;
      font-weight: 650;
      margin-bottom: 10px;
    }

    .fade-in {
      animation: fadeIn 0.32s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 860px) {
      .vp-grid {
        grid-template-columns: 1fr;
      }

      .vp-shell {
        padding: 20px;
      }

      .vp-button-row button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <div id="app"></div>
  </main>

  <script>
    const MISSIONS = [
      {
        id: 1,
        title: "Missão 1 — O E-mail Caótico",
        phase: "FASE 1 — Sobrevivência Operacional",
        psychological_objective: "Parar de se sentir perdido.",
        scenario_type: "E-mail bruto recebido de um diretor",
        raw_content:
          "Pessoal, precisamos resolver rapidamente essa situação do churn porque os números pioraram nas últimas semanas. Quero entender quais clientes estão saindo mais, o que está causando isso, quais áreas precisam atuar e o que conseguimos fazer rapidamente. Também preciso consolidar isso antes da reunião de sexta. Tentem trazer algo acionável porque diretoria vai cobrar respostas.",
        problem:
          "O seu trabalho é transformar esse caos em estrutura operacional. A diretoria não precisa apenas de uma resposta bonita: precisa de clareza, prioridade, ação, responsáveis e próximos passos.",
        how_to_think: [
          "Separe ruído de decisão.",
          "Transforme uma solicitação ampla em blocos operacionais.",
          "Identifique o que precisa ser entendido, decidido e executado.",
          "Defina prioridades antes de listar ações.",
          "Evite responder como opinião solta; responda como estrutura de trabalho."
        ],
        expected_structure: `Resumo executivo:
(...)

Prioridades:
1. (...)
2. (...)
3. (...)

Ações:
- (...)
- (...)
- (...)

Responsáveis:
- Área / pessoa: (...)

Próximos passos:
- Até quando?
- O que será entregue?
- Como isso será usado na reunião de sexta?`,
        placeholder: "Cole aqui sua estrutura operacional. Você pode escrever diretamente ou usar uma IA externa para apoiar sua primeira versão.",
        required_sections: ["resumo", "prioridade", "ação", "ações", "responsável", "responsáveis", "próximo", "próximos"],
        required_context_terms: ["churn", "cliente", "clientes", "diretoria", "sexta", "reunião"],
        min_chars: 420,
        min_lines: 8,
        min_section_hits: 4,
        min_context_hits: 3,
        attributes_gain: {
          Clareza: 14,
          Síntese: 12,
          Estrutura: 16,
          Contexto: 8,
          Priorização: 10
        },
        competency: "estruturação operacional inicial"
      },
      {
        id: 2,
        title: "Missão 2 — A Reunião Desalinhada",
        phase: "FASE 1 — Sobrevivência Operacional",
        psychological_objective: "Transformar discussão dispersa em decisão prática.",
        scenario_type: "Notas brutas de reunião",
        raw_content:
          "Marketing disse que os clientes reclamam da experiência. Produto acha que o problema é falta de funcionalidade. Atendimento comentou que os tickets aumentaram, mas não sabe se é causa ou sintoma. Comercial quer uma oferta de retenção. Dados ainda não fechou a análise por segmento. Ninguém sabe exatamente se o churn está concentrado em clientes novos, antigos, grandes contas ou usuários de baixo uso. A reunião terminou sem decisão.",
        problem:
          "O seu trabalho é converter uma reunião desalinhada em um quadro de decisão. Não basta repetir o que cada área falou: você precisa organizar hipóteses, lacunas, evidências e encaminhamentos.",
        how_to_think: [
          "Separe fatos, hipóteses e opiniões.",
          "Mostre o que já se sabe e o que ainda precisa ser validado.",
          "Transforme desalinhamento em perguntas decisórias.",
          "Defina quais áreas devem produzir quais evidências.",
          "Crie um caminho de fechamento da decisão."
        ],
        expected_structure: `Fatos observados:
(...)

Hipóteses:
1. (...)
2. (...)

Lacunas de informação:
- (...)

Evidências necessárias:
- (...)

Encaminhamentos por área:
- Marketing: (...)
- Produto: (...)
- Atendimento: (...)
- Dados: (...)

Decisão pendente:
(...)`,
        placeholder: "Transforme as notas da reunião em uma estrutura de decisão operacional.",
        required_sections: ["fato", "hipótese", "hipóteses", "lacuna", "evidência", "encaminhamento", "decisão"],
        required_context_terms: ["marketing", "produto", "atendimento", "comercial", "dados", "churn"],
        min_chars: 520,
        min_lines: 10,
        min_section_hits: 4,
        min_context_hits: 4,
        attributes_gain: {
          Clareza: 8,
          Estrutura: 14,
          Contexto: 14,
          Confiabilidade: 8,
          Priorização: 8
        },
        competency: "separação entre opinião, hipótese e evidência"
      },
      {
        id: 3,
        title: "Missão 3 — O Prompt Operacional",
        phase: "FASE 2 — Operação Assistida por IA",
        psychological_objective: "Aprender a delegar bem para uma IA externa.",
        scenario_type: "Solicitação de trabalho com IA",
        raw_content:
          "Você precisa usar uma IA externa para apoiar a análise de churn. O problema é que prompts vagos geram respostas genéricas. A liderança precisa de uma análise executiva com hipóteses, segmentos prioritários, perguntas para os dados, riscos de interpretação e uma proposta de plano de ação para a reunião de sexta.",
        problem:
          "O seu trabalho é escrever um prompt operacional forte para usar em uma IA externa. A plataforma não executa IA própria; ela treina sua capacidade de formular uma instrução madura.",
        how_to_think: [
          "Defina papel, contexto e objetivo da IA.",
          "Explique o problema real antes de pedir a saída.",
          "Defina formato esperado.",
          "Inclua critérios de qualidade.",
          "Peça que a IA diferencie fatos, hipóteses e recomendações."
        ],
        expected_structure: `Papel da IA:
(...)

Contexto:
(...)

Objetivo:
(...)

Tarefa:
(...)

Formato da resposta:
1. Resumo executivo
2. Hipóteses
3. Segmentos prioritários
4. Perguntas para análise
5. Plano de ação

Critérios de qualidade:
- (...)`,
        placeholder: "Escreva aqui o prompt que você usaria no ChatGPT, Claude, Gemini ou Copilot.",
        required_sections: ["papel", "contexto", "objetivo", "tarefa", "formato", "critério", "critérios"],
        required_context_terms: ["churn", "segmento", "hipótese", "dados", "sexta", "liderança"],
        min_chars: 620,
        min_lines: 12,
        min_section_hits: 5,
        min_context_hits: 4,
        attributes_gain: {
          Clareza: 8,
          Estrutura: 12,
          Contexto: 14,
          Confiabilidade: 12,
          Automação: 10,
          Orquestração: 6
        },
        competency: "formulação de prompt operacional"
      }
    ];

    const ATTRIBUTES = [
      "Clareza",
      "Síntese",
      "Estrutura",
      "Contexto",
      "Confiabilidade",
      "Automação",
      "Priorização",
      "Orquestração"
    ];

    let state = createInitialState();

    function createInitialState() {
      const attributes = {};
      ATTRIBUTES.forEach(attr => attributes[attr] = 0);

      return {
        currentMissionIndex: 0,
        started: false,
        completedMissions: [],
        attributes,
        attempts: {},
        lastPassed: false,
        lastFeedback: null,
        currentAnswer: ""
      };
    }

    function normalizeText(text) {
      return String(text || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/ç/g, "c");
    }

    function unique(array) {
      return [...new Set(array)];
    }

    function countHits(text, terms) {
      const normalized = normalizeText(text);
      const found = [];

      terms.forEach(term => {
        const termNorm = normalizeText(term);
        if (normalized.includes(termNorm)) {
          found.push(term);
        }
      });

      return {
        count: unique(found).length,
        found: unique(found).sort()
      };
    }

    function countStructuralTitles(text) {
      const lines = String(text || "")
        .split("\n")
        .map(line => line.trim())
        .filter(Boolean);

      let titleLike = 0;

      lines.forEach(line => {
        if (line.includes(":") && line.length <= 80) {
          titleLike += 1;
        } else if (/^\d+[\.)]\s+/.test(line)) {
          titleLike += 1;
        } else if (/^[-•]\s+/.test(line)) {
          titleLike += 1;
        }
      });

      return titleLike;
    }

    function detectGenericAnswer(text) {
      const clean = normalizeText(text).replace(/[^a-z0-9\s]/g, " ");
      const words = clean.split(/\s+/).filter(Boolean);
      const uniqueWords = unique(words);

      if (words.length < 45) return true;
      if (uniqueWords.length < 25) return true;

      const keywordOnly = ["resumo", "prioridade", "acao", "acoes", "prazo", "responsavel", "proximo", "passo"];
      const intersection = uniqueWords.filter(word => keywordOnly.includes(word));

      if (intersection.length >= 4 && words.length < 70) return true;

      return false;
    }

    function evaluateResponse(answer, mission) {
      const cleanAnswer = String(answer || "").trim();
      const lines = cleanAnswer.split("\n").filter(line => line.trim());
      const sectionHits = countHits(cleanAnswer, mission.required_sections);
      const contextHits = countHits(cleanAnswer, mission.required_context_terms);
      const structuralTitles = countStructuralTitles(cleanAnswer);
      const generic = detectGenericAnswer(cleanAnswer);

      const checks = {
        "Tamanho mínimo": cleanAnswer.length >= mission.min_chars,
        "Mínimo de linhas": lines.length >= mission.min_lines,
        "Seções estruturadas": sectionHits.count >= mission.min_section_hits,
        "Contexto do caso": contextHits.count >= mission.min_context_hits,
        "Organização visível": structuralTitles >= 5,
        "Não genérica": !generic
      };

      const passed = Object.values(checks).every(Boolean);
      const strengths = [];
      const gaps = [];

      if (checks["Tamanho mínimo"]) {
        strengths.push("Você desenvolveu a resposta com densidade suficiente para análise operacional.");
      } else {
        gaps.push(`Sua resposta ainda está curta. Ela precisa ter pelo menos ${mission.min_chars} caracteres para demonstrar raciocínio, não apenas intenção.`);
      }

      if (checks["Mínimo de linhas"]) {
        strengths.push("A resposta já apresenta divisão visual adequada, o que facilita leitura executiva.");
      } else {
        gaps.push(`A resposta precisa de mais quebras e organização. Use pelo menos ${mission.min_lines} linhas com blocos claros.`);
      }

      if (checks["Seções estruturadas"]) {
        strengths.push("Você utilizou seções compatíveis com uma entrega operacional.");
      } else {
        gaps.push("Faltam seções operacionais claras. Uma boa resposta precisa separar blocos como resumo, prioridades, ações, responsáveis e próximos passos.");
      }

      if (checks["Contexto do caso"]) {
        strengths.push("Você conectou a resposta ao contexto real da missão.");
      } else {
        gaps.push("A resposta ainda parece genérica. Ela precisa mencionar elementos do caso, como churn, clientes, reunião, diretoria, áreas envolvidas ou prazo.");
      }

      if (checks["Organização visível"]) {
        strengths.push("A estrutura visual ajuda a transformar informação dispersa em execução.");
      } else {
        gaps.push("A organização ainda não está suficientemente visível. Use títulos, listas, numeração e blocos de decisão.");
      }

      if (checks["Não genérica"]) {
        strengths.push("A resposta demonstra elaboração própria, não apenas palavras soltas.");
      } else {
        gaps.push("Sua resposta ainda está genérica. Escrever apenas palavras como resumo, prioridade, ação e prazo não demonstra competência operacional.");
      }

      const diagnosis = passed
        ? `Competência mínima demonstrada: ${mission.competency}. Você transformou ambiguidade em estrutura, o que é o núcleo da maturidade operacional com IA.`
        : "Ainda não há maturidade operacional mínima para avançar. Ajuste sua resposta para transformar informação em execução: contexto, estrutura, prioridade, ação e consequência.";

      return {
        passed,
        checks,
        strengths,
        gaps,
        diagnosis,
        foundSections: sectionHits.found,
        foundContext: contextHits.found,
        metrics: {
          chars: cleanAnswer.length,
          lines: lines.length,
          sectionHits: sectionHits.count,
          contextHits: contextHits.count,
          structuralTitles
        }
      };
    }

    function applyMissionGain(mission) {
      if (!state.completedMissions.includes(mission.id)) {
        state.completedMissions.push(mission.id);

        Object.entries(mission.attributes_gain).forEach(([attr, gain]) => {
          state.attributes[attr] = Math.min(100, (state.attributes[attr] || 0) + gain);
        });
      }
    }

    function escapeHTML(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function currentMission() {
      return MISSIONS[state.currentMissionIndex];
    }

    function renderHeader() {
      return `
        <div class="vp-shell fade-in">
          <div class="vp-header">
            <div class="vp-brand">VEROPRED ENGENHARIA DE PROMPTS</div>
            <h1 class="vp-title">Treinamento interativo de IA</h1>
            <div class="vp-subtitle">
              Jornada 01 — Analista Perdido · Aula, laboratório e desafio profissional em uma única experiência.
            </div>
          </div>
      `;
    }

    function renderAttributesPanel() {
      const rows = ATTRIBUTES.map(attr => {
        const value = state.attributes[attr] || 0;
        return `
          <div class="vp-attr-row">
            <div class="vp-attr-label">
              <span>${attr}</span>
              <span>${value}%</span>
            </div>
            <div class="vp-progress-wrap">
              <div class="vp-progress-bar" style="width:${value}%;"></div>
            </div>
          </div>
        `;
      }).join("");

      return `
        <div class="vp-card">
          <h3>Painel de maturidade</h3>
          ${rows}
          <div class="vp-divider"></div>
          <div class="vp-status">
            Missões concluídas: <b>${state.completedMissions.length}/${MISSIONS.length}</b><br>
            Jornada ativa: <b>Analista Perdido</b><br>
            Recompensa principal: evolução cognitiva aplicada.
          </div>
        </div>
      `;
    }

    function renderIntro() {
      return `
        ${renderHeader()}
          <div class="vp-grid">
            <div>
              <div class="vp-card">
                <h2>Você está entrando em uma academia operacional.</h2>
                <div class="vp-text">
                  Aqui, o objetivo não é decorar prompts. É aprender a transformar caos em estrutura.
                  A plataforma não usa IA própria. Você pode usar ChatGPT, Claude, Gemini, Copilot
                  ou qualquer ferramenta externa como apoio.
                  <br><br>
                  A cada missão, você receberá um cenário realista, verá o problema com clareza,
                  entenderá como pensar e produzirá uma resposta operacional. Só avança quem demonstra
                  competência mínima.
                </div>
              </div>

              <div class="vp-card">
                <h3>Como funciona</h3>
                <div class="vp-text">
                  1. Leia o cenário bruto.<br>
                  2. Entenda o problema operacional.<br>
                  3. Use a estrutura esperada como molde, não como resposta pronta.<br>
                  4. Escreva sua resposta ou construa um prompt para usar em uma IA externa.<br>
                  5. Envie, receba feedback e tente novamente até amadurecer a entrega.
                </div>
              </div>
            </div>

            <div>
              ${renderAttributesPanel()}
            </div>
          </div>
        </div>

        <div class="vp-button-row">
          <button class="btn-start" onclick="startJourney()">Iniciar jornada</button>
        </div>
      `;
    }

    function renderMission() {
      const mission = currentMission();
      const how = mission.how_to_think.map(item => `<li>${escapeHTML(item)}</li>`).join("");
      const attempts = state.attempts[mission.id] || 0;

      return `
        ${renderHeader()}
          <div class="vp-grid">
            <div>
              <div class="vp-card">
                <div class="vp-phase">${escapeHTML(mission.phase)}</div>
                <h2>${escapeHTML(mission.title)}</h2>
                <div class="vp-objective">
                  <b>Objetivo psicológico:</b> ${escapeHTML(mission.psychological_objective)}
                </div>
              </div>

              <div class="vp-card">
                <h3>Cenário</h3>
                <div class="vp-small">${escapeHTML(mission.scenario_type)}</div>
                <br>
                <div class="vp-chaos">${escapeHTML(mission.raw_content)}</div>
              </div>

              <div class="vp-card">
                <h3>O problema</h3>
                <div class="vp-text">${escapeHTML(mission.problem)}</div>
              </div>

              <div class="vp-card">
                <h3>Como pensar</h3>
                <div class="vp-text">
                  Uma resposta operacional madura reduz ruído, organiza prioridades,
                  transforma texto em ação e cria clareza para decisão.
                </div>
                <ul class="vp-list">${how}</ul>
              </div>

              <div class="vp-card">
                <h3>Estrutura esperada</h3>
                <div class="vp-text">
                  Use o molde abaixo como referência. Não copie mecanicamente. Complete com raciocínio próprio.
                </div>
                <br>
                <div class="vp-structure">${escapeHTML(mission.expected_structure)}</div>
              </div>
            </div>

            <div>
              ${renderAttributesPanel()}
              <div class="vp-card">
                <h3>Critério de avanço</h3>
                <div class="vp-text">
                  Você avança apenas se demonstrar estrutura mínima, contexto, clareza e organização operacional.
                </div>
                <div class="vp-divider"></div>
                <div class="vp-small">
                  Tentativas nesta missão: ${attempts}
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="vp-answer-title">Sua resposta (dica de ouro: tá perdido em como responder ? Use IA pra te ajudar.</div>
        <textarea id="answerBox" placeholder="${escapeHTML(mission.placeholder)}">${escapeHTML(state.currentAnswer)}</textarea>

        <div class="vp-button-row">
          <button class="btn-submit" onclick="submitAnswer()">Enviar resposta</button>
          <button class="btn-next" onclick="nextMission()" ${state.lastPassed ? "" : "disabled"}>Próxima missão</button>
          <button class="btn-restart" onclick="restartJourney()">Reiniciar</button>
        </div>

        <div id="feedbackBox">
          ${state.lastFeedback ? renderFeedback(state.lastFeedback) : ""}
        </div>
      `;
    }

    function renderFeedback(result) {
      const cssClass = result.passed ? "vp-feedback-success" : "vp-feedback-fail";
      const title = result.passed ? "Missão validada" : "Ajuste necessário";
      const strengths = result.strengths.length
        ? result.strengths.map(item => `<li>${escapeHTML(item)}</li>`).join("")
        : "<li>Ainda não há elementos fortes o suficiente para destacar.</li>";
      const gaps = result.gaps.length
        ? result.gaps.map(item => `<li>${escapeHTML(item)}</li>`).join("")
        : "<li>Nenhum ajuste crítico identificado.</li>";
      const checks = Object.entries(result.checks)
        .map(([key, value]) => `<li>${escapeHTML(key)}: ${value ? "OK" : "Ajustar"}</li>`)
        .join("");

      return `
        <div class="vp-feedback ${cssClass} fade-in">
          <div class="vp-feedback-title">${title}</div>
          <div class="vp-text">${escapeHTML(result.diagnosis)}</div>

          <div class="vp-divider"></div>

          <h3>O que funcionou</h3>
          <ul class="vp-list">${strengths}</ul>

          <h3 style="margin-top:18px;">O que precisa melhorar</h3>
          <ul class="vp-list">${gaps}</ul>

          <h3 style="margin-top:18px;">Validação objetiva</h3>
          <ul class="vp-list">${checks}</ul>

          <div class="vp-divider"></div>

          <div class="vp-small">
            Caracteres: ${result.metrics.chars} · Linhas: ${result.metrics.lines} ·
            Seções detectadas: ${result.metrics.sectionHits} ·
            Termos contextuais: ${result.metrics.contextHits} ·
            Marcadores estruturais: ${result.metrics.structuralTitles}
          </div>
        </div>
      `;
    }

    function renderCompletion() {
      const avg = Math.floor(
        Object.values(state.attributes).reduce((sum, value) => sum + value, 0) / ATTRIBUTES.length
      );

      return `
        ${renderHeader()}
          <div class="vp-grid">
            <div>
              <div class="vp-card">
                <h2>Jornada 01 concluída</h2>
                <div class="vp-text">
                  Você concluiu o primeiro ciclo da jornada <b>Analista Perdido</b>.
                  A evolução demonstrada não foi pontuação superficial: foi capacidade de transformar
                  ambiguidade em estrutura operacional.
                  <br><br>
                  Maturidade média atual: <b>${avg}%</b>.
                </div>
              </div>

              <div class="vp-card">
                <h3>Competências ativadas</h3>
                <div class="vp-text">
                  Clareza executiva, síntese operacional, estruturação de problemas,
                  uso mais maduro de IA externa, organização de hipóteses e tradução de caos em plano de ação.
                </div>
              </div>
            </div>
            <div>
              ${renderAttributesPanel()}
            </div>
          </div>
        </div>

        <div class="vp-button-row">
          <button class="btn-restart" onclick="restartJourney()">Reiniciar</button>
        </div>
      `;
    }

    function render() {
      const app = document.getElementById("app");

      if (!state.started) {
        app.innerHTML = renderIntro();
        return;
      }

      if (state.currentMissionIndex >= MISSIONS.length) {
        app.innerHTML = renderCompletion();
        return;
      }

      app.innerHTML = renderMission();
    }

    function startJourney() {
      state.started = true;
      state.currentMissionIndex = 0;
      state.lastPassed = false;
      state.lastFeedback = null;
      state.currentAnswer = "";
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function submitAnswer() {
      const mission = currentMission();
      const answerBox = document.getElementById("answerBox");
      state.currentAnswer = answerBox ? answerBox.value : "";

      state.attempts[mission.id] = (state.attempts[mission.id] || 0) + 1;

      const result = evaluateResponse(state.currentAnswer, mission);
      state.lastPassed = result.passed;
      state.lastFeedback = result;

      if (result.passed) {
        applyMissionGain(mission);
      }

      render();

      const feedbackBox = document.getElementById("feedbackBox");
      if (feedbackBox) {
        feedbackBox.scrollIntoView({ behavior: "smooth", block: "start" });
      }
    }

    function nextMission() {
      if (!state.lastPassed) return;

      if (state.currentMissionIndex < MISSIONS.length - 1) {
        state.currentMissionIndex += 1;
        state.lastPassed = false;
        state.lastFeedback = null;
        state.currentAnswer = "";
        render();
        window.scrollTo({ top: 0, behavior: "smooth" });
      } else {
        state.currentMissionIndex = MISSIONS.length;
        state.lastPassed = false;
        state.lastFeedback = null;
        state.currentAnswer = "";
        render();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }
    }

    function restartJourney() {
      state = createInitialState();
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    render();
  </script>
</body>
</html>
