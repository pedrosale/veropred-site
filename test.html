<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Veropred Treinamentos de IA In Company</title>

  <style>
    :root {
      --bg: #070707;
      --panel: #111;
      --panel-2: #171717;
      --text: #f4eee6;
      --muted: #aaa29a;
      --soft: #746d64;
      --gold: #d6a85f;
      --gold-2: #f0cf8a;
      --copper: #b87333;
      --danger: #d88775;
      --success: #d6a85f;
      --border: rgba(214,168,95,.24);
      --border-strong: rgba(214,168,95,.46);
      --shadow: rgba(0,0,0,.55);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 80% 0%, rgba(184,115,51,.18), transparent 32%),
        radial-gradient(circle at 10% 90%, rgba(214,168,95,.10), transparent 30%),
        linear-gradient(135deg, #030303, #090909 52%, #11100e);
      color: var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }

    .page {
      width: min(1180px, 94vw);
      margin: 0 auto;
      padding: 28px 0 56px;
    }

    .shell {
      border: 1px solid var(--border);
      border-radius: 28px;
      background:
        radial-gradient(circle at top right, rgba(214,168,95,.11), transparent 36%),
        linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,.018));
      box-shadow: 0 32px 90px var(--shadow);
      padding: 28px;
      overflow: hidden;
    }

    .header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 20px;
      align-items: end;
      border-bottom: 1px solid rgba(214,168,95,.18);
      padding-bottom: 22px;
      margin-bottom: 22px;
    }

    .brand {
      color: var(--gold);
      font-size: 12px;
      letter-spacing: .18em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 5vw, 52px);
      line-height: 1.02;
      letter-spacing: -.045em;
      max-width: 850px;
    }

    .subtitle {
      color: var(--muted);
      line-height: 1.6;
      max-width: 760px;
      margin-top: 12px;
      font-size: 15px;
    }

    .badge {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 10px 14px;
      color: var(--gold-2);
      background: rgba(214,168,95,.07);
      font-size: 12px;
      letter-spacing: .1em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1.3fr) minmax(320px, .7fr);
      gap: 20px;
      align-items: start;
    }

    .card {
      border: 1px solid rgba(214,168,95,.20);
      border-radius: 20px;
      background: rgba(255,255,255,.028);
      padding: 22px;
      margin-bottom: 18px;
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 22px;
      letter-spacing: -.02em;
    }

    .kicker {
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: .12em;
      font-size: 12px;
      margin-bottom: 10px;
    }

    .phase {
      display: inline-block;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 7px 11px;
      color: var(--gold);
      background: rgba(214,168,95,.07);
      font-size: 12px;
      margin-bottom: 12px;
    }

    .text {
      color: var(--muted);
      line-height: 1.65;
      font-size: 15px;
    }

    .scenario {
      white-space: pre-wrap;
      border-left: 4px solid var(--copper);
      border-radius: 16px;
      padding: 18px;
      background: linear-gradient(90deg, rgba(184,115,51,.10), transparent 42%), #090909;
      color: #eadfce;
      line-height: 1.65;
      font-size: 15px;
    }

    .structure {
      white-space: pre-wrap;
      overflow-x: auto;
      border: 1px solid rgba(214,168,95,.20);
      border-radius: 16px;
      padding: 16px;
      background: rgba(214,168,95,.055);
      color: #eadcc6;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
      line-height: 1.6;
    }

    textarea {
      width: 100%;
      min-height: 300px;
      resize: vertical;
      border: 1px solid rgba(214,168,95,.34);
      border-radius: 18px;
      background: #090909;
      color: var(--text);
      padding: 17px;
      font-size: 15px;
      line-height: 1.58;
      outline: none;
      margin: 12px 0;
      font-family: inherit;
    }

    textarea:focus {
      border-color: rgba(214,168,95,.75);
      box-shadow: 0 0 0 3px rgba(214,168,95,.08);
    }

    button {
      min-height: 46px;
      border-radius: 14px;
      border: 1px solid rgba(214,168,95,.28);
      padding: 0 18px;
      cursor: pointer;
      font-weight: 750;
      background: var(--gold);
      color: #15100a;
      transition: .18s ease;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 14px 30px rgba(0,0,0,.24);
    }

    button:disabled {
      opacity: .35;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: transparent;
      color: var(--gold);
    }

    .btn-dark {
      background: #222;
      color: var(--text);
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .mentor-wrap {
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 20px;
      align-items: stretch;
      min-height: 430px;
    }

    .mentor-img {
      border: 1px solid var(--border);
      border-radius: 24px;
      background:
        radial-gradient(circle at 50% 18%, rgba(214,168,95,.20), transparent 38%),
        #111;
      overflow: hidden;
      position: relative;
    }

    .mentor-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
      min-height: 430px;
    }

    .mentor-id {
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: 14px;
      padding: 13px;
      border: 1px solid rgba(214,168,95,.22);
      border-radius: 16px;
      background: rgba(5,5,5,.72);
      backdrop-filter: blur(12px);
    }

    .mentor-id b {
      color: var(--gold-2);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .12em;
      display: block;
      margin-bottom: 4px;
    }

    .mentor-id span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .dialogue {
      border: 1px solid rgba(214,168,95,.25);
      border-radius: 24px;
      background:
        radial-gradient(circle at top right, rgba(214,168,95,.11), transparent 45%),
        rgba(255,255,255,.035);
      padding: 26px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .dialogue h2 {
      font-size: clamp(24px, 4vw, 36px);
      line-height: 1.1;
      margin: 0 0 14px;
    }

    .speech {
      color: #eadcc6;
      line-height: 1.58;
      font-size: clamp(17px, 2vw, 21px);
      animation: fade .24s ease both;
    }

    .example {
      margin-top: 16px;
      background: rgba(214,168,95,.055);
      border: 1px solid rgba(214,168,95,.18);
      border-radius: 16px;
      padding: 15px;
      color: #eadcc6;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
      white-space: pre-wrap;
      line-height: 1.55;
    }

    .dots {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      border: 1px solid rgba(214,168,95,.38);
      background: rgba(255,255,255,.05);
    }

    .dot.active {
      width: 24px;
      background: var(--gold);
      box-shadow: 0 0 18px rgba(214,168,95,.24);
    }

    .sidebar-title {
      color: var(--gold);
      font-size: 12px;
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .progress {
      height: 10px;
      background: #090909;
      border: 1px solid rgba(214,168,95,.16);
      border-radius: 999px;
      overflow: hidden;
    }

    .bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #8a552b, #d6a85f, #f0cf8a);
      transition: width .35s ease;
    }

    .mission-map {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 10px;
    }

    .node {
      border: 1px solid rgba(214,168,95,.18);
      border-radius: 14px;
      padding: 10px;
      background: rgba(255,255,255,.025);
      min-height: 78px;
    }

    .node.active {
      border-color: var(--border-strong);
      background: rgba(214,168,95,.07);
    }

    .node.done {
      border-color: rgba(214,168,95,.34);
      background: rgba(214,168,95,.045);
    }

    .node.locked {
      opacity: .34;
    }

    .node small {
      color: var(--soft);
      font-size: 11px;
    }

    .node b {
      display: block;
      color: var(--text);
      font-size: 12px;
      line-height: 1.3;
      margin-top: 4px;
    }

    .metric {
      margin-bottom: 14px;
    }

    .metric-label {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 6px;
    }

    .feedback {
      border-radius: 20px;
      padding: 20px;
      margin-top: 18px;
    }

    .success {
      border: 1px solid rgba(214,168,95,.42);
      background: rgba(214,168,95,.08);
    }

    .fail {
      border: 1px solid rgba(216,135,117,.36);
      background: rgba(216,135,117,.08);
    }

    .feedback-title {
      font-size: 22px;
      color: var(--gold-2);
      font-weight: 760;
      margin-bottom: 10px;
    }

    .score-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 14px;
    }

    .score-box {
      border: 1px solid rgba(214,168,95,.18);
      border-radius: 15px;
      padding: 12px;
      background: rgba(255,255,255,.025);
    }

    .score-box b {
      font-size: 12px;
      display: block;
      margin-bottom: 5px;
    }

    .score-box span {
      color: var(--gold);
      font-size: 22px;
      font-weight: 800;
    }

    .unlock {
      border: 1px solid rgba(214,168,95,.18);
      border-radius: 16px;
      padding: 14px;
      background: rgba(255,255,255,.025);
      margin-bottom: 10px;
    }

    .unlock.done {
      border-color: var(--border-strong);
      background: rgba(214,168,95,.06);
    }

    .unlock b {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
    }

    .unlock span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .hint {
      border: 1px solid rgba(214,168,95,.20);
      border-radius: 16px;
      padding: 14px;
      background: rgba(214,168,95,.05);
      color: #eadcc6;
      line-height: 1.55;
      margin-top: 12px;
    }

    .hidden { display: none; }

    @keyframes fade {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 920px) {
      .header, .grid, .mentor-wrap {
        grid-template-columns: 1fr;
      }

      .score-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 620px) {
      .shell { padding: 20px; }
      .actions button { width: 100%; }
      .mission-map, .score-grid { grid-template-columns: 1fr; }
      .mentor-img img { min-height: 320px; }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="shell">
      <header class="header">
        <div>
          <div class="brand">VEROPRED TREINAMENTOS DE IA IN COMPANY</div>
          <h1>Curso interativo de maturidade operacional com IA</h1>
          <p class="subtitle">
            Uma jornada gamificada para ensinar colaboradores a transformar demandas confusas em respostas estruturadas,
            prompts melhores, decisões mais claras e workflows assistidos por IA.
          </p>
        </div>
        <div class="badge" id="rankBadge">Nível Inicial</div>
      </header>

      <div id="app"></div>
    </section>
  </main>

  <script>
    const LUDOVICO_IMAGE = "assets/ludovico_2.png";

    const MISSIONS = [
      {
        title: "Missão 1 — O E-mail Caótico",
        phase: "Fase 1 — Estrutura Operacional",
        type: "Resposta operacional estruturada",
        scenario:
`Assunto: churn

Pessoal, precisamos resolver rapidamente essa situação do churn porque os números pioraram nas últimas semanas.

Ainda não tenho certeza se isso é produto, atendimento, preço, onboarding ou outra coisa. Mas a reunião de sexta com diretoria vai cobrar uma leitura minimamente madura.

Não quero um relatório gigante. Quero algo acionável: onde está concentrado, o que pode estar causando, quem precisa atuar e o que conseguimos fazer nos próximos dias.

Tentem não trazer só opinião. Precisamos chegar com alguma estrutura.`,
        problem: "Transformar uma demanda ampla, urgente e ambígua em uma estrutura operacional mínima para decisão.",
        expected:
`Resumo executivo:
(...)

Prioridades:
1. (...)
2. (...)
3. (...)

Hipóteses iniciais:
- (...)

Ações imediatas:
- (...)

Responsáveis:
- Área / pessoa: (...)

Próximos passos:
- Até quando?
- O que será entregue?
- Como isso será usado na reunião de sexta?`,
        mentor: [
          {
            label: "O que será aprendido",
            text: "Nesta missão, você vai aprender a transformar uma demanda ambígua em uma estrutura operacional clara, sem depender de opinião solta."
          },
          {
            label: "Erro comum",
            text: "O erro mais comum é responder com uma lista genérica de boas práticas. A diretoria não precisa de conselho abstrato. Precisa de leitura, prioridade e encaminhamento."
          },
          {
            label: "O que deve ser feito",
            text: "Organize a resposta em blocos: resumo executivo, prioridades, hipóteses, ações imediatas, responsáveis e próximos passos para a reunião de sexta."
          },
          {
            label: "Exemplo mínimo",
            text: "Você pode começar assim:",
            example:
`Resumo executivo:
O aumento de churn exige diagnóstico rápido por segmento e plano de contenção até sexta.

Prioridades:
1. Identificar onde o churn se concentra.
2. Separar hipóteses de produto, atendimento, preço e onboarding.
3. Definir responsáveis por análise e ação.`
          }
        ],
        requiredSections: ["resumo", "prioridades", "hipóteses", "ações", "responsáveis", "próximos"],
        requiredTerms: ["churn", "diretoria", "sexta", "produto", "atendimento", "preço", "onboarding"],
        minChars: 520,
        minLines: 9,
        forbidden: ["atue como", "papel da ia", "prompt", "formato da resposta"],
        weights: {
          estrutura: 26,
          contexto: 20,
          decisao: 18,
          especificidade: 16,
          confiabilidade: 10,
          sintese: 10
        }
      },
      {
        title: "Missão 2 — O Prompt Operacional",
        phase: "Fase 2 — Operação Assistida por IA",
        type: "Prompt para IA externa",
        scenario:
`Você precisa usar uma IA externa para apoiar a análise de churn.

A liderança precisa de uma análise executiva com hipóteses, segmentos prioritários, perguntas para os dados, riscos de interpretação e uma proposta de plano de ação para a reunião de sexta.

A IA não terá acesso aos dados. Ela deve ajudar a estruturar o raciocínio, não fingir que conhece a base.`,
        problem: "Escrever um prompt operacional forte para uma IA externa, deixando claro papel, contexto, objetivo, limites e formato.",
        expected:
`Papel da IA:
(...)

Contexto:
(...)

Objetivo:
(...)

Tarefa:
(...)

Limites:
- Não inventar dados.
- Separar fatos, hipóteses e recomendações.

Formato esperado:
1. Resumo executivo
2. Hipóteses
3. Segmentos prioritários
4. Perguntas para os dados
5. Riscos de interpretação
6. Plano de ação

Critérios de qualidade:
(...)`,
        mentor: [
          {
            label: "O que será aprendido",
            text: "Nesta missão, você vai aprender a delegar melhor para uma IA externa, dando contexto, limites e formato de saída."
          },
          {
            label: "Erro comum",
            text: "O erro comum é pedir uma análise de churn como se a IA tivesse acesso aos dados reais. Isso aumenta o risco de resposta bonita, mas sem lastro."
          },
          {
            label: "O que deve ser feito",
            text: "Escreva um prompt que deixe claro o papel da IA, o contexto, o objetivo, a tarefa, os limites e os critérios de qualidade."
          },
          {
            label: "Exemplo mínimo",
            text: "Você pode começar assim:",
            example:
`Papel da IA:
Atue como apoio executivo para estruturar uma análise de churn.

Limite:
Você não tem acesso à base real. Não invente números, segmentos ou causas.

Tarefa:
Organize hipóteses, perguntas para os dados, riscos de interpretação e plano de ação.`
          }
        ],
        requiredSections: ["papel", "contexto", "objetivo", "tarefa", "limites", "formato", "critérios"],
        requiredTerms: ["ia", "churn", "dados", "hipóteses", "segmentos", "sexta", "liderança"],
        minChars: 720,
        minLines: 12,
        forbidden: ["análise concluída", "os dados mostram", "foi identificado que"],
        weights: {
          estrutura: 22,
          contexto: 22,
          decisao: 12,
          especificidade: 14,
          confiabilidade: 22,
          sintese: 8
        }
      },
      {
        title: "Missão 3 — O Erro Grave da IA",
        phase: "Fase 3 — Governança e Confiança",
        type: "Correção executiva e protocolo",
        scenario:
`Uma IA externa gerou uma recomendação dizendo que o churn está concentrado em clientes enterprise.

O problema: ninguém forneceu dados por segmento para a IA.

Mesmo assim, a frase entrou em um rascunho de apresentação.

Você percebeu o risco antes da reunião.`,
        problem: "Criar uma correção executiva e um protocolo simples para evitar que inferências não verificadas sejam tratadas como fatos.",
        expected:
`Correção executiva:
(...)

Risco identificado:
(...)

Fato vs hipótese:
- Fato: (...)
- Hipótese: (...)

Ajuste na apresentação:
(...)

Protocolo de validação:
1. (...)
2. (...)
3. (...)

Mensagem para o time:
(...)`,
        mentor: [
          {
            label: "O que será aprendido",
            text: "Nesta missão, você vai aprender a proteger decisões contra respostas convincentes, porém não verificadas."
          },
          {
            label: "Erro comum",
            text: "O erro comum é demonizar a IA ou aceitar a frase falsa sem validação. O ponto maduro é corrigir o uso, não criar pânico."
          },
          {
            label: "O que deve ser feito",
            text: "Diferencie fato, hipótese e inferência. Ajuste a apresentação e crie uma regra simples de validação."
          },
          {
            label: "Exemplo mínimo",
            text: "Você pode começar assim:",
            example:
`Correção executiva:
A afirmação sobre clientes enterprise deve ser tratada como hipótese, não como fato.

Risco identificado:
A IA não recebeu dados por segmento.

Protocolo:
1. Toda afirmação factual precisa de fonte.
2. Toda hipótese deve ser marcada como hipótese.
3. Recomendações devem indicar evidência faltante.`
          }
        ],
        requiredSections: ["correção", "risco", "fato", "hipótese", "ajuste", "protocolo", "mensagem"],
        requiredTerms: ["ia", "churn", "enterprise", "segmento", "dados", "apresentação", "validação"],
        minChars: 780,
        minLines: 14,
        forbidden: ["confirmado", "com certeza", "os dados provam"],
        weights: {
          estrutura: 18,
          contexto: 18,
          decisao: 16,
          especificidade: 14,
          confiabilidade: 26,
          sintese: 8
        }
      },
      {
        title: "Missão 4 — Arquitetura Final",
        phase: "Fase 4 — Sistema Operacional com IA",
        type: "Arquitetura operacional",
        scenario:
`Depois de várias semanas, a empresa percebeu que o problema não era apenas churn.

O problema real era ausência de arquitetura operacional para transformar sinais em decisões.

Agora querem institucionalizar um modelo de trabalho assistido por IA:

- entrada de sinais;
- organização de hipóteses;
- análise assistida;
- validação;
- decisão;
- execução;
- revisão.`,
        problem: "Desenhar uma arquitetura operacional completa para uso maduro de IA em decisões recorrentes.",
        expected:
`Princípio central:
(...)

Arquitetura operacional:
1. Entrada de sinais
2. Estruturação do problema
3. Análise assistida por IA
4. Validação humana
5. Decisão
6. Execução
7. Revisão e aprendizado

Papéis:
(...)

Controles:
(...)

Indicadores:
(...)

Cadência:
(...)

Resultado esperado:
(...)`,
        mentor: [
          {
            label: "O que será aprendido",
            text: "Nesta missão, você vai sair da resposta isolada e construir um sistema replicável de trabalho assistido por IA."
          },
          {
            label: "Erro comum",
            text: "O erro comum é criar uma lista de boas práticas. Arquitetura operacional precisa de fluxo, papéis, controles, indicadores e cadência."
          },
          {
            label: "O que deve ser feito",
            text: "Conecte sinais, hipóteses, IA, validação humana, decisão, execução e aprendizado."
          },
          {
            label: "Exemplo mínimo",
            text: "Você pode começar assim:",
            example:
`Princípio central:
IA não substitui decisão. IA organiza sinais, hipóteses e alternativas para decisão humana.

Arquitetura:
1. Entrada de sinais.
2. Estruturação do problema.
3. Análise assistida.
4. Validação humana.
5. Decisão.
6. Execução.
7. Revisão.`
          }
        ],
        requiredSections: ["princípio", "arquitetura", "sinais", "hipóteses", "ia", "validação", "decisão", "execução", "revisão", "papéis", "controles"],
        requiredTerms: ["churn", "sinais", "hipóteses", "ia", "decisão", "execução", "governança", "aprendizado"],
        minChars: 950,
        minLines: 18,
        forbidden: ["basta usar ia", "automatizar tudo", "sem revisão"],
        weights: {
          estrutura: 26,
          contexto: 14,
          decisao: 16,
          especificidade: 14,
          confiabilidade: 18,
          sintese: 12
        }
      }
    ];

    const UNLOCKS = [
      { threshold: 1, title: "Modo Executivo", desc: "Síntese, prioridade e linguagem de decisão." },
      { threshold: 2, title: "Controle de Qualidade", desc: "Validação de limites e redução de respostas genéricas." },
      { threshold: 3, title: "Governança de IA", desc: "Separação entre fato, hipótese e inferência." },
      { threshold: 4, title: "Arquitetura Operacional", desc: "Uso de IA como sistema de trabalho replicável." }
    ];

    const state = {
      screen: "intro",
      missionIndex: 0,
      mentorStep: 0,
      completed: 0,
      scores: [],
      attributes: {
        Clareza: 0,
        Estrutura: 0,
        Contexto: 0,
        Confiabilidade: 0,
        Priorização: 0,
        Orquestração: 0
      },
      lastFeedback: null
    };

    const app = document.getElementById("app");
    const rankBadge = document.getElementById("rankBadge");

    function normalize(text) {
      return (text || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
    }

    function countMatches(text, list) {
      const t = normalize(text);
      return list.filter(item => t.includes(normalize(item))).length;
    }

    function countLines(text) {
      return text.split("\n").filter(l => l.trim().length > 0).length;
    }

    function scoreAnswer(answer, mission) {
      const text = normalize(answer);
      const chars = answer.trim().length;
      const lines = countLines(answer);

      const sectionRatio = countMatches(answer, mission.requiredSections) / mission.requiredSections.length;
      const termRatio = countMatches(answer, mission.requiredTerms) / mission.requiredTerms.length;
      const forbiddenCount = countMatches(answer, mission.forbidden);

      const hasDecision =
        text.includes("recomend") ||
        text.includes("decis") ||
        text.includes("prior") ||
        text.includes("proximo") ||
        text.includes("responsav") ||
        text.includes("acao");

      const hasEvidence =
        text.includes("evidencia") ||
        text.includes("valid") ||
        text.includes("fato") ||
        text.includes("hipotese") ||
        text.includes("dados") ||
        text.includes("limite");

      const genericTerms = [
        "melhorar a experiencia",
        "analisar os dados",
        "acompanhar indicadores",
        "envolver as areas",
        "comunicacao constante",
        "boas praticas",
        "de forma eficiente"
      ];

      const genericPenalty = countMatches(answer, genericTerms) * 5;
      const forbiddenPenalty = forbiddenCount * 8;

      const estrutura = Math.min(100, sectionRatio * 100);
      const contexto = Math.min(100, termRatio * 100);
      const decisao = hasDecision ? 85 : 35;
      const especificidade = Math.min(100, (chars / mission.minChars) * 55 + (lines / mission.minLines) * 45);
      const confiabilidade = hasEvidence ? 88 : 42;
      const sintese = chars > mission.minChars * 2.6 ? 55 : chars >= mission.minChars ? 88 : 62;

      const weighted =
        estrutura * mission.weights.estrutura / 100 +
        contexto * mission.weights.contexto / 100 +
        decisao * mission.weights.decisao / 100 +
        especificidade * mission.weights.especificidade / 100 +
        confiabilidade * mission.weights.confiabilidade / 100 +
        sintese * mission.weights.sintese / 100;

      const finalScore = Math.max(0, Math.min(100, Math.round(weighted - genericPenalty - forbiddenPenalty)));

      const missingSections = mission.requiredSections.filter(s => !normalize(answer).includes(normalize(s)));
      const missingTerms = mission.requiredTerms.filter(s => !normalize(answer).includes(normalize(s)));

      const passed = finalScore >= 72 && missingSections.length <= 2 && chars >= mission.minChars * 0.85;

      return {
        finalScore,
        passed,
        metrics: {
          Estrutura: Math.round(estrutura),
          Contexto: Math.round(contexto),
          Decisão: Math.round(decisao),
          Especificidade: Math.round(especificidade),
          Confiabilidade: Math.round(confiabilidade),
          Síntese: Math.round(sintese)
        },
        missingSections,
        missingTerms,
        penalties: {
          genericPenalty,
          forbiddenPenalty
        }
      };
    }

    function updateRank() {
      const avg = state.scores.length
        ? Math.round(state.scores.reduce((a, b) => a + b, 0) / state.scores.length)
        : 0;

      let rank = "Nível Inicial";
      if (avg >= 85 && state.completed >= 4) rank = "Arquiteto Operacional";
      else if (avg >= 78 && state.completed >= 3) rank = "Operador Avançado";
      else if (avg >= 72 && state.completed >= 2) rank = "Praticante Maduro";
      else if (state.completed >= 1) rank = "Em evolução";

      rankBadge.textContent = rank;
    }

    function setScreen(screen) {
      state.screen = screen;
      render();
    }

    function currentMission() {
      return MISSIONS[state.missionIndex];
    }

    function renderIntro() {
      app.innerHTML = `
        <div class="grid">
          <div>
            <div class="card">
              <div class="kicker">Produto</div>
              <h2>Treinamento corporativo gamificado para uso real de IA no trabalho</h2>
              <p class="text">
                O curso ensina o colaborador a usar IA com maturidade: estruturar problemas, criar prompts melhores,
                revisar respostas, reduzir genericidade, validar hipóteses e transformar informação em decisão.
              </p>
              <div class="hint">
                A proposta não é ensinar comandos soltos. A proposta é desenvolver maturidade operacional com IA.
              </div>
            </div>

            <div class="card">
              <div class="kicker">Jornada</div>
              <div class="mission-map">
                ${MISSIONS.map((m, i) => `
                  <div class="node ${i === 0 ? "active" : "locked"}">
                    <small>${m.phase}</small>
                    <b>${m.title.replace("Missão " + (i+1) + " — ", "")}</b>
                  </div>
                `).join("")}
              </div>
            </div>

            <div class="actions">
              <button onclick="startMission()">Iniciar treinamento</button>
            </div>
          </div>

          <aside>
            <div class="card">
              <div class="sidebar-title">Competências avaliadas</div>
              ${Object.keys(state.attributes).map(k => metric(k, state.attributes[k])).join("")}
            </div>

            <div class="card">
              <div class="sidebar-title">Desbloqueios</div>
              ${UNLOCKS.map(u => unlock(u)).join("")}
            </div>
          </aside>
        </div>
      `;
    }

    function metric(label, value) {
      return `
        <div class="metric">
          <div class="metric-label">
            <span>${label}</span>
            <span>${value}</span>
          </div>
          <div class="progress"><div class="bar" style="width:${Math.min(100, value)}%"></div></div>
        </div>
      `;
    }

    function unlock(u) {
      const done = state.completed >= u.threshold;
      return `
        <div class="unlock ${done ? "done" : ""}">
          <b>${done ? "Liberado — " : "Bloqueado — "}${u.title}</b>
          <span>${u.desc}</span>
        </div>
      `;
    }

    function startMission() {
      state.mentorStep = 0;
      setScreen("mentor");
    }

    function renderMentor() {
      const m = currentMission();
      const step = m.mentor[state.mentorStep];

      app.innerHTML = `
        <div class="mentor-wrap">
          <div class="mentor-img">
            <img src="${LUDOVICO_IMAGE}" onerror="this.style.display='none'; this.parentElement.style.display='flex'; this.parentElement.style.alignItems='center'; this.parentElement.style.justifyContent='center'; this.parentElement.innerHTML += '<div style=&quot;color:#d6a85f;padding:24px;text-align:center&quot;>Ludovico<br><span style=&quot;color:#aaa29a;font-size:13px&quot;>adicione a imagem em assets/ludovico_2.png</span></div>';" />
            <div class="mentor-id">
              <b>Ludovico</b>
              <span>Mentor operacional de uso de IA no trabalho</span>
            </div>
          </div>

          <div class="dialogue">
            <div>
              <div class="kicker">${step.label}</div>
              <h2>${m.title}</h2>
              <div class="speech">${step.text}</div>
              ${step.example ? `<div class="example">${step.example}</div>` : ""}
            </div>

            <div>
              <div class="actions" style="justify-content:space-between; align-items:center; margin-top:26px;">
                <div class="dots">
                  ${m.mentor.map((_, i) => `<span class="dot ${i === state.mentorStep ? "active" : ""}"></span>`).join("")}
                </div>
                <div class="actions">
                  ${state.mentorStep > 0 ? `<button class="btn-secondary" onclick="prevMentor()">Voltar</button>` : ""}
                  <button onclick="nextMentor()">${state.mentorStep === m.mentor.length - 1 ? "Entrar na missão" : "Próximo"}</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function nextMentor() {
      const m = currentMission();
      if (state.mentorStep < m.mentor.length - 1) {
        state.mentorStep++;
        render();
      } else {
        setScreen("mission");
      }
    }

    function prevMentor() {
      if (state.mentorStep > 0) {
        state.mentorStep--;
        render();
      }
    }

    function renderMission() {
      const m = currentMission();

      app.innerHTML = `
        <div class="grid">
          <div>
            <div class="card">
              <span class="phase">${m.phase}</span>
              <h2>${m.title}</h2>
              <p class="text"><b>Tipo de entrega:</b> ${m.type}</p>
              <p class="text"><b>Problema:</b> ${m.problem}</p>
            </div>

            <div class="card">
              <div class="kicker">Cenário</div>
              <div class="scenario">${m.scenario}</div>
            </div>

            <div class="card">
              <div class="kicker">Estrutura esperada</div>
              <div class="structure">${m.expected}</div>
            </div>

            <div class="card">
              <div class="kicker">Sua resposta</div>
              <textarea id="answer" placeholder="Escreva sua entrega aqui. Você pode usar uma IA externa como apoio, mas a resposta final deve estar estruturada para o cenário."></textarea>
              <div class="actions">
                <button onclick="submitAnswer()">Avaliar resposta</button>
                <button class="btn-secondary" onclick="setScreen('mentor')">Rever explicação do Ludovico</button>
              </div>
              <div id="feedback"></div>
            </div>
          </div>

          <aside>
            <div class="card">
              <div class="sidebar-title">Progresso</div>
              <p class="text">${state.completed} de ${MISSIONS.length} missões concluídas</p>
              <div class="progress">
                <div class="bar" style="width:${(state.completed / MISSIONS.length) * 100}%"></div>
              </div>
            </div>

            <div class="card">
              <div class="sidebar-title">Mapa da jornada</div>
              <div class="mission-map">
                ${MISSIONS.map((mission, i) => `
                  <div class="node ${i === state.missionIndex ? "active" : i < state.completed ? "done" : "locked"}">
                    <small>Missão ${i + 1}</small>
                    <b>${mission.title.split("—")[1] || mission.title}</b>
                  </div>
                `).join("")}
              </div>
            </div>

            <div class="card">
              <div class="sidebar-title">Atributos</div>
              ${Object.keys(state.attributes).map(k => metric(k, state.attributes[k])).join("")}
            </div>
          </aside>
        </div>
      `;
    }

    function submitAnswer() {
      const answer = document.getElementById("answer").value;
      const m = currentMission();
      const result = scoreAnswer(answer, m);

      const feedback = document.getElementById("feedback");

      if (result.passed) {
        applyProgress(result.finalScore);
      }

      feedback.innerHTML = `
        <div class="feedback ${result.passed ? "success" : "fail"}">
          <div class="feedback-title">${result.passed ? "Missão aprovada" : "Resposta ainda não madura"}</div>
          <p class="text">
            Score final: <b>${result.finalScore}/100</b>.
            ${result.passed
              ? "A resposta apresenta estrutura suficiente para uso operacional."
              : "A resposta ainda precisa de mais estrutura, contexto ou confiabilidade."}
          </p>

          <div class="score-grid">
            ${Object.entries(result.metrics).map(([k,v]) => `
              <div class="score-box">
                <b>${k}</b>
                <span>${v}</span>
              </div>
            `).join("")}
          </div>

          ${result.missingSections.length ? `
            <div class="hint">
              <b>Blocos ausentes ou fracos:</b><br>
              ${result.missingSections.slice(0, 6).join(", ")}
            </div>
          ` : ""}

          ${result.missingTerms.length ? `
            <div class="hint">
              <b>Contexto pouco explorado:</b><br>
              ${result.missingTerms.slice(0, 6).join(", ")}
            </div>
          ` : ""}

          ${(result.penalties.genericPenalty || result.penalties.forbiddenPenalty) ? `
            <div class="hint">
              <b>Penalizações aplicadas:</b><br>
              Genericidade: ${result.penalties.genericPenalty} pontos · Termos inadequados ao tipo de entrega: ${result.penalties.forbiddenPenalty} pontos.
            </div>
          ` : ""}

          <div class="actions" style="margin-top:16px;">
            ${result.passed
              ? `<button onclick="nextMission()">Avançar</button>`
              : `<button class="btn-dark" onclick="focusAnswer()">Revisar resposta</button>
                 <button class="btn-secondary" onclick="setScreen('mentor')">Rever orientação</button>`}
          </div>
        </div>
      `;

      updateRank();
    }

    function applyProgress(score) {
      if (state.missionIndex >= state.completed) {
        state.completed++;
        state.scores.push(score);

        state.attributes.Clareza += 10;
        state.attributes.Estrutura += 12;
        state.attributes.Contexto += 8;
        state.attributes.Confiabilidade += 10;
        state.attributes.Priorização += 8;
        state.attributes.Orquestração += 6;
      }
    }

    function focusAnswer() {
      document.getElementById("answer").focus();
    }

    function nextMission() {
      if (state.missionIndex < MISSIONS.length - 1) {
        state.missionIndex++;
        state.mentorStep = 0;
        setScreen("mentor");
      } else {
        setScreen("final");
      }
    }

    function renderFinal() {
      const avg = state.scores.length
        ? Math.round(state.scores.reduce((a,b) => a+b, 0) / state.scores.length)
        : 0;

      app.innerHTML = `
        <div class="grid">
          <div>
            <div class="card">
              <div class="kicker">Conclusão</div>
              <h2>Jornada concluída</h2>
              <p class="text">
                O participante concluiu a trilha inicial de maturidade operacional com IA.
                A avaliação consolidada indica capacidade de estruturar problemas, delegar tarefas para IA,
                revisar respostas e desenhar fluxos operacionais com validação humana.
              </p>
              <div class="hint">
                Score médio final: <b>${avg}/100</b>
              </div>
            </div>

            <div class="card">
              <div class="kicker">Relatório executivo</div>
              <div class="structure">
Participante: ______________________

Curso: Veropred Treinamentos de IA In Company

Resultado geral:
Score médio: ${avg}/100
Missões concluídas: ${state.completed}/${MISSIONS.length}

Competências desenvolvidas:
- Clareza operacional
- Estruturação de problemas
- Formulação de prompts
- Validação de respostas de IA
- Separação entre fato, hipótese e inferência
- Comunicação executiva
- Arquitetura operacional com IA

Recomendação:
Participante apto a aplicar IA em rotinas de trabalho com supervisão leve e critérios claros de validação.
              </div>
            </div>

            <div class="actions">
              <button onclick="restart()">Reiniciar demonstração</button>
            </div>
          </div>

          <aside>
            <div class="card">
              <div class="sidebar-title">Atributos finais</div>
              ${Object.keys(state.attributes).map(k => metric(k, state.attributes[k])).join("")}
            </div>

            <div class="card">
              <div class="sidebar-title">Desbloqueios</div>
              ${UNLOCKS.map(u => unlock(u)).join("")}
            </div>
          </aside>
        </div>
      `;
    }

    function restart() {
      state.screen = "intro";
      state.missionIndex = 0;
      state.mentorStep = 0;
      state.completed = 0;
      state.scores = [];
      state.lastFeedback = null;
      state.attributes = {
        Clareza: 0,
        Estrutura: 0,
        Contexto: 0,
        Confiabilidade: 0,
        Priorização: 0,
        Orquestração: 0
      };
      updateRank();
      render();
    }

    function render() {
      updateRank();

      if (state.screen === "intro") renderIntro();
      if (state.screen === "mentor") renderMentor();
      if (state.screen === "mission") renderMission();
      if (state.screen === "final") renderFinal();
    }

    render();
  </script>
