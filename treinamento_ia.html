<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Veropred Treinamentos de IA In Company</title>

  <style>
    :root {
      --vp-bg: #050505;
      --vp-panel: #101010;
      --vp-panel-2: #171717;
      --vp-panel-3: #1e1a15;
      --vp-border: rgba(214, 168, 95, 0.26);
      --vp-border-strong: rgba(214, 168, 95, 0.48);
      --vp-gold: #d6a85f;
      --vp-gold-2: #f0cf8a;
      --vp-copper: #b87333;
      --vp-bronze: #8a552b;
      --vp-text: #f3eee7;
      --vp-muted: #aaa29a;
      --vp-soft: #706a62;
      --vp-danger: #d08370;
      --vp-success: #c8a96a;
      --vp-graphite: #242424;
      --vp-shadow: rgba(0, 0, 0, 0.55);
      --vp-glow: rgba(214, 168, 95, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 78% 0%, rgba(184,115,51,0.22), transparent 32%),
        radial-gradient(circle at 8% 95%, rgba(214,168,95,0.11), transparent 26%),
        linear-gradient(135deg, #030303 0%, #080808 48%, #0d0b09 100%);
      color: var(--vp-text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.014) 1px, transparent 1px);
      background-size: 52px 52px;
      mask-image: radial-gradient(circle at center, black, transparent 78%);
      opacity: 0.32;
      z-index: -1;
    }

    .page {
      width: min(1220px, 94vw);
      margin: 0 auto;
      padding: 30px 0 54px;
    }

    .vp-shell {
      background:
        radial-gradient(circle at top right, rgba(184,115,51,0.16), transparent 34%),
        radial-gradient(circle at bottom left, rgba(214,168,95,0.08), transparent 32%),
        linear-gradient(135deg, rgba(6,6,6,0.98) 0%, rgba(12,12,12,0.98) 50%, rgba(16,15,13,0.98) 100%);
      border: 1px solid var(--vp-border);
      border-radius: 24px;
      padding: 28px;
      color: var(--vp-text);
      box-shadow: 0 30px 90px var(--vp-shadow);
      margin-bottom: 22px;
      position: relative;
      overflow: hidden;
    }

    .vp-shell::after {
      content: "";
      position: absolute;
      inset: auto -15% -35% auto;
      width: 360px;
      height: 360px;
      background: radial-gradient(circle, rgba(214,168,95,0.12), transparent 68%);
      pointer-events: none;
    }

    .vp-header {
      position: relative;
      z-index: 1;
      border-bottom: 1px solid rgba(214,168,95,0.22);
      padding-bottom: 20px;
      margin-bottom: 22px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 20px;
      align-items: end;
    }

    .vp-brand {
      font-size: 13px;
      letter-spacing: 0.18em;
      color: var(--vp-gold);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .vp-title {
      font-size: clamp(29px, 5vw, 46px);
      line-height: 1.04;
      font-weight: 650;
      color: var(--vp-text);
      margin: 0;
      letter-spacing: -0.04em;
      max-width: 820px;
    }

    .vp-subtitle {
      font-size: 16px;
      color: var(--vp-muted);
      margin-top: 10px;
      line-height: 1.55;
      max-width: 800px;
    }

    .vp-rank-badge {
      border: 1px solid rgba(214,168,95,0.28);
      border-radius: 999px;
      padding: 10px 14px;
      background: rgba(214,168,95,0.07);
      color: var(--vp-gold-2);
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      white-space: nowrap;
      box-shadow: inset 0 0 24px rgba(214,168,95,0.04);
    }

    .vp-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.28fr) minmax(320px, 0.72fr);
      gap: 20px;
      align-items: start;
      position: relative;
      z-index: 1;
    }

    .vp-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.045), rgba(255,255,255,0.018));
      border: 1px solid rgba(214,168,95,0.20);
      border-radius: 18px;
      padding: 22px;
      margin-bottom: 18px;
      position: relative;
      overflow: hidden;
      transition: transform 0.22s ease, border-color 0.22s ease, background 0.22s ease;
    }

    .vp-card:hover {
      border-color: rgba(214,168,95,0.34);
      transform: translateY(-1px);
    }

    .vp-card h2 {
      margin: 0 0 12px 0;
      font-size: 22px;
      color: var(--vp-text);
      line-height: 1.25;
      letter-spacing: -0.02em;
    }

    .vp-card h3,
    .vp-feedback h3 {
      margin: 0 0 10px 0;
      font-size: 13px;
      color: var(--vp-gold);
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .vp-phase {
      display: inline-block;
      padding: 7px 11px;
      border: 1px solid rgba(214,168,95,0.32);
      border-radius: 999px;
      color: var(--vp-gold);
      background: rgba(214,168,95,0.08);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .vp-objective {
      color: var(--vp-muted);
      font-size: 14px;
      margin-bottom: 16px;
      line-height: 1.55;
    }

    .vp-chaos {
      background:
        linear-gradient(90deg, rgba(184,115,51,0.10), transparent 42%),
        #090909;
      border-left: 4px solid var(--vp-copper);
      border-radius: 14px;
      padding: 18px;
      color: #e8dfd3;
      font-size: 15px;
      line-height: 1.7;
      white-space: pre-wrap;
      box-shadow: inset 0 0 34px rgba(0,0,0,0.35);
    }

    .vp-text {
      color: var(--vp-muted);
      line-height: 1.65;
      font-size: 15px;
    }

    .vp-structure {
      background: rgba(214,168,95,0.06);
      border: 1px solid rgba(214,168,95,0.20);
      border-radius: 14px;
      padding: 18px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      color: #eadcc6;
      font-size: 14px;
      line-height: 1.65;
      white-space: pre-wrap;
      overflow-x: auto;
    }

    .vp-list {
      margin: 8px 0 0 0;
      padding-left: 18px;
      color: var(--vp-muted);
      line-height: 1.65;
    }

    .vp-list li {
      margin-bottom: 6px;
    }

    .vp-progress-wrap {
      background: #090909;
      border: 1px solid rgba(214,168,95,0.14);
      border-radius: 12px;
      height: 10px;
      overflow: hidden;
      margin-top: 6px;
    }

    .vp-progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #7f4a23, #d6a85f, #f0cf8a);
      border-radius: 12px;
      transition: width 0.45s ease;
      box-shadow: 0 0 16px rgba(214,168,95,0.24);
    }

    .vp-attr-row {
      margin-bottom: 14px;
    }

    .vp-attr-label {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--vp-muted);
    }

    .vp-status {
      font-size: 14px;
      color: var(--vp-muted);
      line-height: 1.6;
    }

    .vp-small {
      font-size: 12px;
      color: var(--vp-soft);
      line-height: 1.55;
    }

    .vp-divider {
      height: 1px;
      background: rgba(214,168,95,0.18);
      margin: 18px 0;
    }

    .vp-answer-title {
      color: var(--vp-gold);
      font-size: 14px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin: 12px 0 10px 0;
    }

    textarea {
      display: block;
      width: 100%;
      min-height: 330px;
      resize: vertical;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.02), transparent),
        #0a0a0a;
      color: #f0e8dc;
      border: 1px solid rgba(214,168,95,0.35);
      border-radius: 16px;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
      line-height: 1.58;
      padding: 17px;
      outline: none;
      margin-bottom: 14px;
      box-shadow: inset 0 0 34px rgba(0,0,0,0.32);
    }

    textarea:focus {
      border-color: rgba(214,168,95,0.75);
      box-shadow: 0 0 0 3px rgba(214,168,95,0.08), inset 0 0 34px rgba(0,0,0,0.32);
    }

    .vp-button-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    button {
      min-height: 46px;
      border-radius: 13px;
      border: 1px solid rgba(214,168,95,0.24);
      font-weight: 750;
      letter-spacing: 0.02em;
      padding: 0 18px;
      cursor: pointer;
      color: #111;
      background: var(--vp-gold);
      transition: transform 0.18s ease, opacity 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.24);
    }

    button:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .btn-start { background: var(--vp-copper); color: #fff2df; width: 100%; }
    .btn-submit { background: var(--vp-gold); color: #17120a; }
    .btn-next { background: #8a552b; color: #fff2df; }
    .btn-restart { background: #242424; color: #f3eee7; }
    .btn-ghost { background: transparent; color: var(--vp-gold); }

    .vp-feedback {
      border-radius: 18px;
      padding: 20px;
      color: var(--vp-text);
      margin-top: 18px;
      position: relative;
      overflow: hidden;
    }

    .vp-feedback::before {
      content: "";
      position: absolute;
      inset: -30% auto auto -20%;
      width: 260px;
      height: 260px;
      background: radial-gradient(circle, rgba(214,168,95,0.10), transparent 68%);
      pointer-events: none;
    }

    .vp-feedback-success {
      background: rgba(214,168,95,0.08);
      border: 1px solid rgba(214,168,95,0.38);
    }

    .vp-feedback-fail {
      background: rgba(208,131,112,0.08);
      border: 1px solid rgba(208,131,112,0.35);
    }

    .vp-feedback-title {
      color: var(--vp-gold-2);
      font-size: 20px;
      font-weight: 680;
      margin-bottom: 10px;
      letter-spacing: -0.015em;
    }

    .vp-maturity-line {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
      margin-top: 14px;
    }

    .vp-rubric-chip {
      border: 1px solid rgba(214,168,95,0.20);
      background: rgba(255,255,255,0.026);
      border-radius: 14px;
      padding: 12px;
      min-height: 78px;
    }

    .vp-rubric-chip strong {
      display: block;
      color: var(--vp-text);
      font-size: 12px;
      margin-bottom: 5px;
    }

    .vp-rubric-chip span {
      color: var(--vp-gold);
      font-size: 20px;
      font-weight: 760;
    }

    .vp-rubric-chip small {
      display: block;
      color: var(--vp-soft);
      font-size: 11px;
      margin-top: 3px;
    }

    .vp-unlock-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 12px;
    }

    .vp-unlock {
      border: 1px solid rgba(214,168,95,0.20);
      background: rgba(255,255,255,0.025);
      border-radius: 16px;
      padding: 15px;
      min-height: 100px;
      position: relative;
      overflow: hidden;
    }

    .vp-unlock.unlocked {
      border-color: rgba(214,168,95,0.46);
      background:
        radial-gradient(circle at top right, rgba(214,168,95,0.12), transparent 58%),
        rgba(214,168,95,0.045);
    }

    .vp-unlock.locked {
      opacity: 0.54;
      filter: grayscale(0.25);
    }

    .vp-unlock-title {
      color: var(--vp-text);
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .vp-unlock-desc {
      color: var(--vp-muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .vp-unlock-status {
      color: var(--vp-gold);
      font-size: 11px;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      margin-top: 10px;
    }

    .vp-map {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 14px;
    }

    .vp-map-node {
      border: 1px solid rgba(214,168,95,0.20);
      border-radius: 14px;
      padding: 12px;
      background: rgba(255,255,255,0.022);
      min-height: 88px;
    }

    .vp-map-node.active {
      border-color: rgba(214,168,95,0.55);
      background: rgba(214,168,95,0.07);
      box-shadow: inset 0 0 24px rgba(214,168,95,0.04);
    }

    .vp-map-node.done {
      border-color: rgba(214,168,95,0.36);
      background: rgba(214,168,95,0.045);
    }

    .vp-map-node.locked {
      opacity: 0.36;
    }

    .vp-map-node small {
      color: var(--vp-soft);
      font-size: 11px;
    }

    .vp-map-node b {
      display: block;
      color: var(--vp-text);
      font-size: 12px;
      margin-top: 5px;
      line-height: 1.3;
    }

    .vp-philosophy {
      border: 1px solid rgba(214,168,95,0.22);
      background:
        linear-gradient(90deg, rgba(184,115,51,0.09), transparent),
        rgba(255,255,255,0.018);
      border-radius: 16px;
      padding: 16px;
      color: #e9dcc8;
      font-size: 14px;
      line-height: 1.55;
      margin-bottom: 18px;
    }

    .vp-signal {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .vp-signal span {
      border: 1px solid rgba(214,168,95,0.20);
      border-radius: 999px;
      padding: 7px 10px;
      color: var(--vp-muted);
      font-size: 12px;
      background: rgba(0,0,0,0.18);
    }

    .vp-toast {
      position: fixed;
      right: 22px;
      bottom: 22px;
      width: min(420px, calc(100vw - 44px));
      background:
        radial-gradient(circle at top right, rgba(214,168,95,0.18), transparent 56%),
        #111;
      border: 1px solid rgba(214,168,95,0.38);
      border-radius: 18px;
      padding: 18px;
      z-index: 40;
      box-shadow: 0 24px 80px rgba(0,0,0,0.50);
      animation: toastIn 0.35s ease both;
    }

    .vp-toast-title {
      color: var(--vp-gold-2);
      font-weight: 760;
      margin-bottom: 5px;
      font-size: 15px;
    }

    .vp-toast-text {
      color: var(--vp-muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .fade-in {
      animation: fadeIn 0.32s ease both;
    }

    .soft-rise {
      animation: softRise 0.42s ease both;
    }

    .pulse-glow {
      animation: pulseGlow 1.8s ease-in-out infinite;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes softRise {
      from { opacity: 0; transform: translateY(16px) scale(0.992); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 0 rgba(214,168,95,0.0); }
      50% { box-shadow: 0 0 32px rgba(214,168,95,0.14); }
    }


    .vp-expectation-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 14px;
    }

    .vp-expectation-box {
      border: 1px solid rgba(214,168,95,0.22);
      background: rgba(255,255,255,0.024);
      border-radius: 15px;
      padding: 14px;
    }

    .vp-expectation-box.warning {
      border-color: rgba(208,131,112,0.34);
      background: rgba(208,131,112,0.055);
    }

    .vp-expectation-box b {
      display: block;
      color: var(--vp-gold-2);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 7px;
    }

    .vp-expectation-box span {
      color: var(--vp-muted);
      font-size: 13px;
      line-height: 1.5;
      display: block;
    }

    @media (max-width: 980px) {
      .vp-grid,
      .vp-header {
        grid-template-columns: 1fr;
      }

      .vp-maturity-line {
        grid-template-columns: repeat(2, 1fr);
      }

      .vp-map {
        grid-template-columns: repeat(2, 1fr);
      }

      .vp-rank-badge {
        width: fit-content;
      }
    }

    @media (max-width: 640px) {
      .vp-shell {
        padding: 20px;
      }

      .vp-button-row button {
        width: 100%;
      }

      .vp-unlock-grid {
        grid-template-columns: 1fr;
      }

      .vp-maturity-line {
        grid-template-columns: 1fr;
      }

      .vp-map {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <div id="app"></div>
  </main>

  <script>
    const MISSIONS = [
      {
        id: 1,
        title: "Missão 1 — O E-mail Caótico",
        phase: "FASE 1 — Sobrevivência Operacional",
        arc: "Caos inicial",
        psychological_objective: "Parar de se sentir perdido diante de uma demanda ampla.",
        scenario_type: "E-mail bruto recebido de um diretor",
        raw_content:
`Assunto: churn

Pessoal, precisamos resolver rapidamente essa situação do churn porque os números pioraram nas últimas semanas.

Ainda não tenho certeza se isso é produto, atendimento, preço, onboarding ou outra coisa. Mas a reunião de sexta com diretoria vai cobrar uma leitura minimamente madura.

Não quero um relatório gigante. Quero algo acionável: onde está concentrado, o que pode estar causando, quem precisa atuar e o que conseguimos fazer nos próximos dias.

Tentem não trazer só opinião. Precisamos chegar com alguma estrutura.`,
        problem:
          "Transformar uma demanda ampla, urgente e ambígua em uma estrutura operacional mínima para decisão.",
        how_to_think: [
          "Separe ruído de decisão.",
          "Identifique o que precisa ser entendido, decidido e executado.",
          "Transforme a demanda em blocos: diagnóstico, prioridade, ação e encaminhamento.",
          "Evite responder como opinião solta.",
          "Crie uma estrutura que sobreviva a uma reunião com diretoria."
        ],
        expected_structure:
`Resumo executivo:
(...)

Prioridades:
1. (...)
2. (...)
3. (...)

Hipóteses iniciais:
- (...)

Ações imediatas:
- (...)

Responsáveis:
- Área / pessoa: (...)

Próximos passos:
- Até quando?
- O que será entregue?
- Como isso será usado na reunião de sexta?`,
        placeholder: "Cole aqui sua estrutura operacional. Você pode escrever diretamente ou usar uma IA externa como apoio.",
        required_sections: ["resumo", "prioridade", "prioridades", "hipótese", "hipóteses", "ação", "ações", "responsável", "responsáveis", "próximo", "próximos"],
        required_context_terms: ["churn", "cliente", "clientes", "diretoria", "sexta", "reunião"],
        min_chars: 520,
        min_lines: 10,
        weights: { clareza: 18, sintese: 12, estrutura: 26, contexto: 18, priorizacao: 18, confiabilidade: 8 },
        attributes_gain: { Clareza: 12, Síntese: 8, Estrutura: 14, Contexto: 10, Priorização: 10 },
        competency: "estruturação operacional inicial",
        hint_ladder: [
          "Comece separando diagnóstico, prioridades e próximos passos.",
          "Inclua explicitamente o prazo de sexta e o uso da entrega na reunião com diretoria.",
          "Erro comum: listar ações sem definir hierarquia. Prioridade sem ordem vira apenas inventário.",
          "Estrutura parcial sugerida: Resumo executivo → Prioridades → Hipóteses → Ações imediatas → Responsáveis → Próximos passos."
        ],
        consequence_success: "A diretoria recebe uma leitura inicial com direção clara.",
        consequence_fail: "A demanda continua ampla demais; cada área tende a interpretar o problema de um jeito."
      },
      {
        id: 2,
        title: "Missão 2 — A Reunião Desalinhada",
        phase: "FASE 1 — Sobrevivência Operacional",
        arc: "Ruído entre áreas",
        psychological_objective: "Transformar discussão dispersa em quadro de decisão.",
        scenario_type: "Notas brutas de reunião",
        raw_content:
`Marketing disse que os clientes reclamam da experiência. Produto acha que o problema é falta de funcionalidade. Atendimento comentou que os tickets aumentaram, mas não sabe se é causa ou sintoma.

Comercial quer uma oferta de retenção ainda esta semana. Dados disse que precisa de mais tempo para fechar análise por segmento.

Ninguém sabe exatamente se o churn está concentrado em clientes novos, antigos, grandes contas ou usuários de baixo uso.

A reunião terminou sem decisão.`,
        problem:
          "Converter uma reunião desalinhada em um quadro de decisão: fatos, hipóteses, lacunas, evidências e encaminhamentos.",
        how_to_think: [
          "Separe fatos, hipóteses e opiniões.",
          "Mostre o que já se sabe e o que ainda precisa ser validado.",
          "Transforme desalinhamento em perguntas decisórias.",
          "Defina evidências por área.",
          "Crie caminho de fechamento."

      a.forEach(word => { if (b.has(word)) intersection += 1; });

          return;
        }

        const usefulContent = String(section.content || "").replace(/[-•\d.()]/g, " ").replace(/\s+/g, " ").trim();
        const hasScenarioAnchor = countHits(section.title + " " + section.content, scenarioTerms).count >= 1;
        const developed = usefulContent.length >= 80 && !isLooseWordList(usefulContent) && hasScenarioAnchor;

        if (developed) deepSections.push(req);
      });

      const minDeep = Math.max(3, Math.ceil(required.length * 0.45));
      return {
        sections,
        deepSections,
        missing,
        requiredCount: required.length,
        deepCount: deepSections.length,
        minDeep,
        passed: deepSections.length >= minDeep
      };
    }

    function detectWrongOutputFormat(answer, mission) {
      const clean = normalizeText(answer);
      const wrongPatterns = mission.wrong_output_patterns || [];
      const foundWrongPatterns = wrongPatterns.filter(pattern => clean.includes(normalizeText(pattern)));
      const hasPromptSkeleton = countHits(answer, ["papel da ia", "contexto", "objetivo", "tarefa", "formato da resposta", "critérios de qualidade", "atue como"]).count >= 4;
      const promptAllowed = ["prompt_ia", "refinamento_ia"].includes(mission.expected_output_type);

      let reason = "";
      if (!promptAllowed && hasPromptSkeleton) {
        reason = "A resposta usa esqueleto de prompt para IA em uma missão que pede outra entrega.";
      } else if (foundWrongPatterns.length) {
        reason = `Formato incompatível detectado: ${foundWrongPatterns.join(", ")}.`;
      }

      if (mission.expected_output_type === "matriz_tradeoff") {
        const hasAlternatives = countHits(answer, ["desconto", "onboarding", "grandes contas"]).count >= 2;
        const hasComparison = countHits(answer, ["comparação", "comparar", "alternativas", "trade-off", "trade-offs", "critério", "critérios"]).count >= 3;
        if (!hasAlternatives || !hasComparison) reason = "A missão exige comparação explícita entre alternativas, não apenas plano de ação.";
      }

      if (mission.expected_output_type === "quadro_decisao") {
        const hasDecisionFrame = countHits(answer, ["fatos", "hipóteses", "lacunas", "evidências", "decisão pendente"]).count >= 4;
        if (!hasDecisionFrame) reason = "A missão exige quadro de decisão com fatos, hipóteses, lacunas, evidências e decisão pendente.";
      }

      if (mission.expected_output_type === "protocolo_validacao") {
        const hasValidationFrame = countHits(answer, ["fato", "hipótese", "inferência", "validação", "revisão", "apresentação"]).count >= 4;
        if (!hasValidationFrame) reason = "A missão exige protocolo de validação, separando fato, hipótese e inferência.";
      }

      return { wrong: Boolean(reason), reason, foundWrongPatterns };
    }

    function evaluateMissionSpecificity(answer, mission, scoring) {
      const exclusive = countHits(answer, mission.exclusive_terms || []);
      const typeRule = OUTPUT_TYPE_RULES[mission.expected_output_type] || {};
      const typeHits = countHits(answer, mission.output_required_patterns || []);
      const wrongFormat = detectWrongOutputFormat(answer, mission);
      const reused = detectReusedAnswer(answer, state.previousAnswers, mission);
      const sectionDepth = validateSectionDepth(answer, mission);
      const rawScenarioHits = countHits(answer, [...(mission.required_context_terms || []), ...(mission.exclusive_terms || [])]);

      const exclusiveScore = Math.min(100, Math.round((exclusive.count / Math.max(1, mission.min_exclusive_hits)) * 100));
      const typeScore = Math.min(100, Math.round((typeHits.count / Math.max(1, (mission.output_required_patterns || []).length * 0.65)) * 100));
      const sectionDepthScore = Math.min(100, Math.round((sectionDepth.deepCount / Math.max(1, sectionDepth.minDeep)) * 100));
      const scenarioScore = Math.min(100, Math.round((rawScenarioHits.count / Math.max(1, ((mission.required_context_terms || []).length + (mission.exclusive_terms || []).length) * 0.34)) * 100));
      const reusePenalty = reused.reused ? 45 : reused.warning ? 18 : 0;
      const wrongPenalty = wrongFormat.wrong ? 45 : 0;

      const score = clampScore(
        exclusiveScore * 0.28 +
        typeScore * 0.22 +
        sectionDepthScore * 0.24 +
        scenarioScore * 0.18 +
        Math.min(100, scoring.rubric.contexto) * 0.08 -
        reusePenalty -
        wrongPenalty
      );

      return {
        score,
        exclusive,
        typeHits,
        wrongFormat,
        reused,
        sectionDepth,
        scenarioHits: rawScenarioHits,
        typeLabel: typeRule.label || mission.delivery_label,
        notExpected: typeRule.not_expected || mission.not_expected,
        passed: score >= 70 &&
          exclusive.count >= mission.min_exclusive_hits &&
          !wrongFormat.wrong &&
          !reused.reused &&
          sectionDepth.passed &&
          typeHits.count >= Math.max(3, Math.ceil((mission.output_required_patterns || []).length * 0.50))
      };
    }

    function scoreRubric(answer, mission) {
      const cleanAnswer = String(answer || "").trim();
      const lines = cleanAnswer.split("\n").filter(line => line.trim());
      const sections = countHits(cleanAnswer, mission.required_sections);
      const context = countHits(cleanAnswer, mission.required_context_terms);
      const structuralTitles = countStructuralTitles(cleanAnswer);
      const stats = wordStats(cleanAnswer);
      const generic = detectGenericAnswer(cleanAnswer, mission);

      const hasDecisionLanguage = countHits(cleanAnswer, [
        "decisão", "recomendação", "critério", "prioridade", "risco", "responsável", "prazo", "evidência", "hipótese", "validação"
      ]).count;

      const hasGovernanceLanguage = countHits(cleanAnswer, [
        "validar", "validação", "controle", "limite", "fato", "hipótese", "evidência", "não inventar", "revisão"
      ]).count;

      const hasActionLanguage = countHits(cleanAnswer, [
        "ação", "ações", "próximo", "próximos", "responsável", "responsáveis", "prazo", "entrega", "cadência"
      ]).count;

      const lengthScore = Math.min(100, Math.floor((cleanAnswer.length / mission.min_chars) * 100));
      const lineScore = Math.min(100, Math.floor((lines.length / mission.min_lines) * 100));
      const structureScore = Math.min(100, Math.floor(((sections.count / Math.max(1, mission.required_sections.length * 0.62)) * 54) + ((structuralTitles / 8) * 46)));
      const contextScore = Math.min(100, Math.floor((context.count / Math.max(1, mission.required_context_terms.length * 0.62)) * 100));
      const clarityScore = Math.min(100, Math.floor((lengthScore * 0.25) + (lineScore * 0.25) + (structureScore * 0.30) + (hasDecisionLanguage * 5)));
      const synthesisPenalty = cleanAnswer.length > mission.min_chars * 2.7 ? 18 : cleanAnswer.length > mission.min_chars * 2.2 ? 10 : 0;
      const synthesisScore = Math.max(0, Math.min(100, Math.floor(72 + (lineScore * 0.12) + (structureScore * 0.18) - synthesisPenalty)));
      const prioritizationScore = Math.min(100, Math.floor((hasActionLanguage * 9) + (hasDecisionLanguage * 7) + (sections.found.some(s => normalizeText(s).includes("prior")) ? 18 : 0)));
      const reliabilityScore = Math.min(100, Math.floor((hasGovernanceLanguage * 11) + (contextScore * 0.22) + (generic ? -18 : 12)));

      const automationScore = mission.weights.automacao
        ? Math.min(100, Math.floor((countHits(cleanAnswer, ["ia", "automação", "workflow", "fluxo", "padronizada", "processo"]).count * 13) + (structureScore * 0.18)))
        : 0;

      const orchestrationScore = mission.weights.orquestracao
        ? Math.min(100, Math.floor((countHits(cleanAnswer, ["área", "áreas", "stakeholders", "responsáveis", "governança", "papéis", "coordenação"]).count * 12) + (contextScore * 0.16)))
        : 0;

      const rubric = {
        clareza: clampScore(clarityScore),
        sintese: clampScore(synthesisScore),
        estrutura: clampScore(structureScore),
        contexto: clampScore(contextScore),
        priorizacao: clampScore(prioritizationScore),
        confiabilidade: clampScore(reliabilityScore)
      };

      if (mission.weights.automacao) rubric.automacao = clampScore(automationScore);
      if (mission.weights.orquestracao) rubric.orquestracao = clampScore(orchestrationScore);

      if (generic) {
        Object.keys(rubric).forEach(k => rubric[k] = Math.max(0, rubric[k] - 18));
      }

      const weightedScore = Object.entries(mission.weights).reduce((sum, [key, weight]) => {
        return sum + ((rubric[key] || 0) * weight / 100);
      }, 0);

      return {
        rubric,
        weightedScore: Math.round(weightedScore),
        generic,
        metrics: {
          chars: cleanAnswer.length,
          lines: lines.length,
          sectionHits: sections.count,
          contextHits: context.count,
          structuralTitles,
          uniqueRatio: stats.uniqueRatio
        },
        foundSections: sections.found,
        foundContext: context.found
      };
    }

    function clampScore(value) {
      return Math.max(0, Math.min(100, Math.round(value)));
    }

    function evaluateResponse(answer, mission) {
      const cleanAnswer = String(answer || "").trim();
      const scoring = scoreRubric(cleanAnswer, mission);
      const attempts = state.attempts[mission.id] || 0;
      const specificity = evaluateMissionSpecificity(cleanAnswer, mission, scoring);

      const checks = {
        "Densidade mínima": cleanAnswer.length >= mission.min_chars,
        "Organização visual": scoring.metrics.lines >= mission.min_lines,
        "Estrutura operacional": scoring.rubric.estrutura >= 68,
        "Contexto do caso": scoring.rubric.contexto >= 62,
        "Priorização ou decisão": scoring.rubric.priorizacao >= 54,
        "Resposta não genérica": !scoring.generic,
        "Maturidade ponderada": scoring.weightedScore >= 68,
        "Tipo de entrega correto": specificity.typeHits.count >= Math.max(3, Math.ceil((mission.output_required_patterns || []).length * 0.50)),
        "Termos exclusivos da missão": specificity.exclusive.count >= mission.min_exclusive_hits,
        "Formato compatível": !specificity.wrongFormat.wrong,
        "Seções com profundidade": specificity.sectionDepth.passed,
        "Resposta não reaproveitada": !specificity.reused.reused,
        "Aderência específica": specificity.score >= 70
      };

      const passed = Object.values(checks).every(Boolean) && specificity.passed;

      const strengths = [];
      const gaps = [];

      if (specificity.exclusive.count >= mission.min_exclusive_hits) {
        strengths.push(`A resposta usa elementos específicos desta missão: ${specificity.exclusive.found.slice(0, 6).join(", ")}.`);
      } else {
        gaps.push(`Pouca aderência ao cenário específico. Use pelo menos ${mission.min_exclusive_hits} elementos próprios deste caso, como: ${(mission.exclusive_terms || []).slice(0, 7).join(", ")}.`);
      }

      if (!specificity.wrongFormat.wrong) {
        strengths.push(`O formato está compatível com a entrega esperada: ${specificity.typeLabel}.`);
      } else {
        gaps.push(specificity.wrongFormat.reason || "O conteúdo está estruturado, mas no formato errado para esta missão.");
      }

      if (!specificity.reused.reused) {
        if (specificity.reused.warning) {
          gaps.push("A resposta tem sinais de reaproveitamento estrutural. Reforce a adaptação ao tipo de entrega desta missão.");
        }
      } else {
        gaps.push("Sua resposta parece reaproveitada de uma missão anterior. Esta missão exige uma entrega diferente, com formato e vocabulário próprios.");
      }

      if (specificity.sectionDepth.passed) {
        strengths.push("As seções obrigatórias têm densidade mínima e conexão com o cenário, não apenas títulos corretos.");
      } else {
        gaps.push(`Seções superficiais. Pelo menos ${specificity.sectionDepth.minDeep} blocos obrigatórios precisam ter desenvolvimento real, com contexto, consequência e encaminhamento.`);
      }

      if (scoring.rubric.estrutura >= 76) {
        strengths.push("A resposta apresenta arquitetura visível: blocos, hierarquia e encaminhamento operacional.");
      } else {
        gaps.push("A estrutura ainda não sustenta execução. Separe melhor diagnóstico, critérios, ações, responsáveis e revisão.");
      }

      if (scoring.rubric.contexto >= 72) {
        strengths.push("Você conectou a resposta ao cenário real, reduzindo risco de entrega genérica.");
      } else {
        gaps.push("A resposta ainda poderia estar mais ancorada no caso. Sem contexto, a entrega fica reutilizável demais e decisiva de menos.");
      }

      if (scoring.rubric.priorizacao >= 70) {
        strengths.push("Há sinal de hierarquia operacional: nem tudo foi tratado como igualmente importante.");
      } else {
        gaps.push("O principal gargalo está na priorização. Sem hierarquia, execução tende à dispersão.");
      }

      if (scoring.rubric.confiabilidade >= 72) {
        strengths.push("A resposta mostra preocupação com evidência, validação e limites de interpretação.");
      } else {
        gaps.push("Inclua mais controle de qualidade: o que é fato, o que é hipótese, o que precisa ser validado e qual risco permanece.");
      }

      if (scoring.generic) {
        gaps.push("Resposta genérica apesar de longa. Cada bloco precisa carregar uma consequência operacional específica do caso.");
      }

      const bottleneck = getBottleneck(scoring.rubric);
      const maturity = getMaturityLabel(scoring.weightedScore);
      const primaryReason = getPrimaryFailureReason(checks, specificity, scoring);

      const diagnosis = passed
        ? `${mission.consequence_success} Competência demonstrada: ${mission.competency}.`
        : `${primaryReason} ${mission.consequence_fail} Gargalo principal: ${bottleneck.label}. ${bottleneck.message}`;

      return {
        passed,
        checks,
        strengths,
        gaps,
        diagnosis,
        rubric: scoring.rubric,
        weightedScore: scoring.weightedScore,
        missionSpecificityScore: specificity.score,
        maturity,
        bottleneck,
        foundSections: scoring.foundSections,
        foundContext: scoring.foundContext,
        foundExclusive: specificity.exclusive.found,
        expectedDelivery: specificity.typeLabel,
        notExpected: specificity.notExpected,
        specificity,
        metrics: {
          ...scoring.metrics,
          exclusiveHits: specificity.exclusive.count,
          requiredExclusiveHits: mission.min_exclusive_hits,
          deepSections: specificity.sectionDepth.deepCount,
          requiredDeepSections: specificity.sectionDepth.minDeep,
          reuseJaccard: specificity.reused.maxJaccard,
          titleSimilarity: specificity.reused.titleSimilarity
        },
        hint: getProgressiveHint(mission, attempts)
      };
    }

    function getPrimaryFailureReason(checks, specificity, scoring) {
      if (specificity.reused.reused) return "Resposta reaproveitada.";
      if (specificity.wrongFormat.wrong) return "Formato errado para a missão.";
      if (checks["Termos exclusivos da missão"] === false) return "Falta de termos exclusivos do cenário.";
      if (!specificity.sectionDepth.passed) return "Seções superficiais.";
      if (specificity.score < 70) return "Pouca aderência ao cenário específico.";
      if (scoring.generic) return "Resposta genérica apesar de longa.";
      if (!checks["Maturidade ponderada"]) return "Baixa maturidade operacional.";
      return "A entrega ainda não atinge o padrão mínimo desta missão.";
    }

    function getBottleneck(rubric) {
      const labels = {
        clareza: "clareza executiva",
        sintese: "síntese",
        estrutura: "estrutura operacional",
        contexto: "contexto",
        priorizacao: "priorização",
        confiabilidade: "confiabilidade",
        automacao: "automação",
        orquestracao: "orquestração"
      };

      const messages = {
        clareza: "A leitura ainda exige esforço demais; torne a mensagem principal mais explícita.",
        sintese: "Há conteúdo, mas a energia decisória precisa ficar mais concentrada.",
        estrutura: "A resposta precisa de blocos que sustentem execução, não apenas raciocínio.",
        contexto: "A entrega ainda poderia servir para casos demais; ancore mais no cenário.",
        priorizacao: "Ações sem hierarquia reduzem capacidade de execução.",
        confiabilidade: "A decisão precisa diferenciar fatos, hipóteses, limites e validações.",
        automacao: "O uso de IA ou workflow ainda não está suficientemente operacionalizado.",
        orquestracao: "Os papéis e handoffs entre áreas precisam ficar mais claros."
      };

      const entries = Object.entries(rubric).sort((a, b) => a[1] - b[1]);
      const [key, value] = entries[0];

      return {
        key,
        value,
        label: labels[key] || key,
        message: messages[key] || "Reforce esse critério para avançar com maturidade."
      };
    }

    function getMaturityLabel(score) {
      if (score >= 88) return "Maturidade avançada";
      if (score >= 76) return "Maturidade consistente";
      if (score >= 68) return "Maturidade mínima demonstrada";
      if (score >= 52) return "Estrutura em formação";
      return "Resposta ainda reativa";
    }

    function getProgressiveHint(mission, attempts) {
      const index = Math.min(Math.max(0, attempts - 1), mission.hint_ladder.length - 1);
      return mission.hint_ladder[index];
    }

    function applyMissionGain(mission) {
      if (!state.completedMissions.includes(mission.id)) {
        state.completedMissions.push(mission.id);

        Object.entries(mission.attributes_gain).forEach(([attr, gain]) => {
          state.attributes[attr] = Math.min(100, (state.attributes[attr] || 0) + gain);
        });

        updateUnlocks();
      }
    }

    function updateUnlocks() {
      const completed = state.completedMissions.length;
      const newUnlocked = UNLOCKS.filter(u => completed >= u.threshold).map(u => u.id);
      const previous = state.unlocked.length;

      state.unlocked = newUnlocked;

      if (newUnlocked.length > previous) {
        const unlock = UNLOCKS.find(u => u.id === newUnlocked[newUnlocked.length - 1]);
        state.toast = {
          title: "Novo módulo desbloqueado",
          text: `${unlock.title}: ${unlock.description}`
        };
      }
    }

    function escapeHTML(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function currentMission() {
      return MISSIONS[state.currentMissionIndex];
    }

    function avgMaturity() {
      return Math.floor(Object.values(state.attributes).reduce((sum, value) => sum + value, 0) / ATTRIBUTES.length);
    }

    function currentRank() {
      const completed = state.completedMissions.length;
      if (completed >= 12) return "Arquiteto de Decisão";
      if (completed >= 9) return "Orquestrador Operacional";
      if (completed >= 6) return "Estrategista Assistido por IA";
      if (completed >= 3) return "Analista Estrutural";
      if (completed >= 1) return "Operador em Evolução";
      return "Iniciante Operacional";
    }

    function randomPhilosophy() {
      const index = (state.completedMissions.length + state.currentMissionIndex) % PHILOSOPHY.length;
      return PHILOSOPHY[index];
    }

    function isUnlocked(id) {
      return state.unlocked.includes(id);
    }

                </div>
              </div>

              ${renderJourneyMap()}
              ${renderFutureJourneys()}
            </div>

            <div>
              ${renderAttributesPanel()}
              ${renderUnlocksPanel()}
            </div>
          </div>
        </div>

        <div class="vp-button-row">
          <button class="btn-start" onclick="startJourney()">Iniciar jornada</button>
        </div>
        ${renderToast()}
      `;
    }

    function renderExpectationPanel(mission) {
      const required = (mission.output_required_patterns || []).slice(0, 8).join(" · ");
      const exclusive = (mission.exclusive_terms || []).slice(0, 7).join(" · ");
      return `
        <div class="vp-card soft-rise">
          <h3>Entrega esperada</h3>
          <div class="vp-expectation-grid">
            <div class="vp-expectation-box">
              <b>Tipo de entrega</b>
              <span>${escapeHTML(mission.delivery_label)}</span>
            </div>
            <div class="vp-expectation-box warning">
              <b>Esta missão não pede</b>
              <span>${escapeHTML(mission.not_expected)}</span>
            </div>
            <div class="vp-expectation-box">
              <b>Blocos avaliados</b>
              <span>${escapeHTML(required)}</span>
            </div>
            <div class="vp-expectation-box warning">
              <b>Formato que reprova</b>
              <span>Resposta genérica, prompt reaproveitado, lista sem decisão ou texto que serviria para qualquer cenário.</span>
            </div>
          </div>
          <div class="vp-divider"></div>
          <div class="vp-small">
            Termos específicos esperados no cenário: ${escapeHTML(exclusive)}.
          </div>
        </div>
      `;
    }

    function renderMission() {
      const mission = currentMission();
      const how = mission.how_to_think.map(item => `<li>${escapeHTML(item)}</li>`).join("");
      const attempts = state.attempts[mission.id] || 0;
      const showExecutive = isUnlocked("executive_mode");
      const showStrategic = isUnlocked("strategic_panel");

      return `
        ${renderHeader()}
          <div class="vp-grid">
            <div>
              <div class="vp-card">
                <div class="vp-phase">${escapeHTML(mission.phase)} · ${escapeHTML(mission.arc)}</div>
                <h2>${escapeHTML(mission.title)}</h2>
                <div class="vp-objective">
                  <b>Objetivo psicológico:</b> ${escapeHTML(mission.psychological_objective)}
                </div>
                <div class="vp-signal">
                  <span>tensão operacional</span>
                  <span>ambiguidade real</span>
                  <span>decisão sob restrição</span>
                </div>
              </div>

              <div class="vp-philosophy">${escapeHTML(randomPhilosophy())}</div>

              <div class="vp-card">
                <h3>Cenário</h3>
                <div class="vp-small">${escapeHTML(mission.scenario_type)}</div>
                <br>
                <div class="vp-chaos">${escapeHTML(mission.raw_content)}</div>
              </div>

              <div class="vp-card">
                <h3>O problema</h3>
                <div class="vp-text">${escapeHTML(mission.problem)}</div>
              </div>

              ${renderExpectationPanel(mission)}

              <div class="vp-card">
                <h3>Como pensar</h3>
                <div class="vp-text">
                  Uma resposta operacional madura reduz ruído, organiza prioridades,
                  transforma texto em ação e cria clareza para decisão.
                </div>
                <ul class="vp-list">${how}</ul>
              </div>

              <div class="vp-card">
                <h3>Estrutura esperada</h3>
                <div class="vp-text">
                  Use o molde abaixo como referência. Não copie mecanicamente. Complete com raciocínio próprio.
                </div>
                <br>
                <div class="vp-structure">${escapeHTML(mission.expected_structure)}</div>
              </div>

              ${showExecutive ? renderExecutiveLens(mission) : ""}
              ${showStrategic ? renderJourneyMap() : ""}
            </div>

            <div>
              ${renderAttributesPanel()}
              ${renderUnlocksPanel()}

              <div class="vp-card">
                <h3>Critério de avanço</h3>
                <div class="vp-text">
                  Você avança apenas se demonstrar estrutura mínima, contexto, clareza,
                  priorização, confiabilidade e aderência específica ao tipo de entrega desta missão.
                </div>
                <div class="vp-divider"></div>
                <div class="vp-small">
                  Tentativas nesta missão: ${attempts}<br>
                  Dica ativa: ${escapeHTML(getProgressiveHint(mission, Math.max(1, attempts + 1)))}
                </div>
              </div>

              ${isUnlocked("quality_control") ? renderQualityPanel() : ""}
            </div>
          </div>
        </div>

        <div class="vp-answer-title">Sua resposta</div>
        <textarea id="answerBox" placeholder="${escapeHTML(mission.placeholder)}">${escapeHTML(state.currentAnswer)}</textarea>

        <div class="vp-button-row">
          <button class="btn-submit" onclick="submitAnswer()">Enviar resposta</button>
          <button class="btn-next" onclick="nextMission()" ${state.lastPassed ? "" : "disabled"}>Próxima missão</button>
          <button class="btn-ghost" onclick="fillScaffold()">Inserir molde</button>
          <button class="btn-restart" onclick="restartJourney()">Reiniciar</button>
        </div>

        <div id="feedbackBox">
          ${state.lastFeedback ? renderFeedback(state.lastFeedback) : ""}
        </div>
        ${renderToast()}
      `;
    }

    function renderExecutiveLens(mission) {
      return `
        <div class="vp-card soft-rise">
          <h3>Modo Executivo desbloqueado</h3>
          <div class="vp-text">
            Nesta missão, procure responder a três perguntas antes de escrever:
          </div>
          <ul class="vp-list">
            <li>Qual decisão fica mais clara depois da sua resposta?</li>
            <li>Qual risco diminui?</li>
            <li>Qual próximo passo se torna executável?</li>
          </ul>
          <div class="vp-divider"></div>
          <div class="vp-small">
            Consequência esperada ao passar: ${escapeHTML(mission.consequence_success)}
          </div>
        </div>
      `;
    }

    function renderQualityPanel() {
      return `
        <div class="vp-card soft-rise">
          <h3>Controle de qualidade</h3>
          <div class="vp-text">
            Antes de enviar, verifique:
          </div>
          <ul class="vp-list">
            <li>Você separou fato, hipótese e recomendação?</li>
            <li>Você indicou limites ou riscos de interpretação?</li>
            <li>A resposta gera ação ou apenas opinião organizada?</li>
          </ul>
        </div>
      `;
    }

    function renderFeedback(result) {
      const cssClass = result.passed ? "vp-feedback-success" : "vp-feedback-fail";
      const title = result.passed ? "Estrutura operacional estabilizada" : "Estrutura ainda instável";

      const strengths = result.strengths.length
        ? result.strengths.map(item => `<li>${escapeHTML(item)}</li>`).join("")
        : "<li>Ainda não há elementos fortes o suficiente para destacar.</li>";

      const gaps = result.gaps.length
        ? result.gaps.map(item => `<li>${escapeHTML(item)}</li>`).join("")
        : "<li>Nenhum ajuste crítico identificado.</li>";

      const checks = Object.entries(result.checks)
        .map(([key, value]) => `<li>${escapeHTML(key)}: ${value ? "OK" : "Ajustar"}</li>`)
        .join("");

      const rubric = Object.entries(result.rubric).map(([key, value]) => `
        <div class="vp-rubric-chip">
          <strong>${escapeHTML(labelRubric(key))}</strong>
          <span>${value}</span>
          <small>/100</small>
        </div>
      `).join("");

      return `
        <div class="vp-feedback ${cssClass} fade-in">
          <div class="vp-feedback-title">${title}</div>
          <div class="vp-text">${escapeHTML(result.diagnosis)}</div>

          <div class="vp-divider"></div>

          <h3>Maturidade da entrega</h3>
          <div class="vp-text">
            Score ponderado: <b>${result.weightedScore}/100</b> · ${escapeHTML(result.maturity)}<br>
            Aderência específica da missão: <b>${result.missionSpecificityScore}/100</b> · Entrega esperada: <b>${escapeHTML(result.expectedDelivery)}</b>
          </div>
          <div class="vp-maturity-line">${rubric}</div>

          <div class="vp-divider"></div>

          <h3>O que funcionou</h3>
          <ul class="vp-list">${strengths}</ul>

          <h3 style="margin-top:18px;">O que precisa melhorar</h3>
          <ul class="vp-list">${gaps}</ul>

          <h3 style="margin-top:18px;">Dica progressiva</h3>
          <div class="vp-text">${escapeHTML(result.hint)}</div>

          <h3 style="margin-top:18px;">Validação objetiva</h3>
          <ul class="vp-list">${checks}</ul>

          <div class="vp-divider"></div>

          <div class="vp-small">
            Caracteres: ${result.metrics.chars} · Linhas: ${result.metrics.lines} ·
            Seções detectadas: ${result.metrics.sectionHits} ·
            Termos contextuais: ${result.metrics.contextHits} ·
            Termos exclusivos: ${result.metrics.exclusiveHits}/${result.metrics.requiredExclusiveHits} ·
            Seções profundas: ${result.metrics.deepSections}/${result.metrics.requiredDeepSections} ·
            Marcadores estruturais: ${result.metrics.structuralTitles}
          </div>
        </div>
      `;
    }

    function labelRubric(key) {
      const labels = {
        clareza: "Clareza",
        sintese: "Síntese",
        estrutura: "Estrutura",
        contexto: "Contexto",
        priorizacao: "Priorização",
        confiabilidade: "Confiabilidade",
        automacao: "Automação",
        orquestracao: "Orquestração"
      };

      return labels[key] || key;
    }

    function renderCompletion() {
      return `
        ${renderHeader()}
          <div class="vp-grid">
            <div>
              <div class="vp-card">
                <h2>Jornada 01 concluída</h2>
                <div class="vp-text">
                  Você concluiu o primeiro ciclo da jornada <b>Estrutura Operacional</b>.
                  A evolução demonstrada não foi pontuação superficial: foi capacidade de transformar
                  ambiguidade em estrutura, IA em instrumento e decisão em sistema.
                  <br><br>
                  Maturidade média atual: <b>${avgMaturity()}%</b>.<br>
                  Patente final: <b>${escapeHTML(currentRank())}</b>.
                </div>
              </div>

              <div class="vp-card">
                <h3>Competências estabilizadas</h3>
                <div class="vp-text">
                  Clareza executiva, síntese operacional, estruturação de problemas,
                  delegação madura para IA externa, controle de qualidade, priorização sob restrição,
                  coordenação entre áreas e arquitetura de decisão.
                </div>
              </div>

              <div class="vp-card pulse-glow">
                <h3>Resultado da jornada</h3>
                <div class="vp-text">
                  Estrutura operacional estabilizada. Capacidade de síntese ampliada.
                  Novo nível de maturidade decisória desbloqueado.
                </div>
              </div>

              ${renderFutureJourneys()}
            </div>
            <div>
              ${renderAttributesPanel()}
              ${renderUnlocksPanel()}
            </div>
          </div>
        </div>

        <div class="vp-button-row">
          <button class="btn-restart" onclick="restartJourney()">Reiniciar</button>
        </div>
        ${renderToast()}
      `;
    }

    function renderToast() {
      if (!state.toast) return "";

      const toast = `
        <div class="vp-toast">
          <div class="vp-toast-title">${escapeHTML(state.toast.title)}</div>
          <div class="vp-toast-text">${escapeHTML(state.toast.text)}</div>
        </div>
      `;

      setTimeout(() => {
        state.toast = null;
        const node = document.querySelector(".vp-toast");
        if (node) node.remove();
      }, 4200);

      return toast;
    }

    function render() {
      const app = document.getElementById("app");

      if (!state.started) {
        app.innerHTML = renderIntro();
        return;
      }

      if (state.currentMissionIndex >= MISSIONS.length) {
        app.innerHTML = renderCompletion();
        return;
      }

      app.innerHTML = renderMission();
    }

    function startJourney() {
      state.started = true;
      state.currentMissionIndex = 0;
      state.lastPassed = false;
      state.lastFeedback = null;
      state.currentAnswer = "";
      state.toast = {
        title: "Jornada iniciada",
        text: "Ambiente operacional ativado. Primeira competência: transformar caos em estrutura."
      };
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function submitAnswer() {
      const mission = currentMission();
      const answerBox = document.getElementById("answerBox");
      state.currentAnswer = answerBox ? answerBox.value : "";

      state.attempts[mission.id] = (state.attempts[mission.id] || 0) + 1;

      const result = evaluateResponse(state.currentAnswer, mission);
      state.lastPassed = result.passed;
      state.lastFeedback = result;
      state.previousAnswers.push({
        missionId: mission.id,
        outputType: mission.expected_output_type,
        answer: state.currentAnswer,
        passed: result.passed,
        timestamp: Date.now()
      });
      if (state.previousAnswers.length > 40) state.previousAnswers.shift();

      if (result.passed) {
        applyMissionGain(mission);
        if (!state.toast) {
          state.toast = {
            title: "Capacidade ampliada",
            text: "Maturidade estrutural aumentada. A próxima missão exigirá mais precisão operacional."
          };
        }
      }

      render();

      const feedbackBox = document.getElementById("feedbackBox");
      if (feedbackBox) feedbackBox.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function nextMission() {
      if (!state.lastPassed) return;

      if (state.currentMissionIndex < MISSIONS.length - 1) {
        state.currentMissionIndex += 1;
        state.lastPassed = false;
        state.lastFeedback = null;
        state.currentAnswer = "";
        state.toast = {
          title: "Nova camada operacional",
          text: `${currentMission().title}: ${currentMission().arc}.`
        };
        render();
        window.scrollTo({ top: 0, behavior: "smooth" });
      } else {
        state.currentMissionIndex = MISSIONS.length;
        state.lastPassed = false;
        state.lastFeedback = null;
        state.currentAnswer = "";
        state.toast = {
          title: "Jornada concluída",
          text: "Arquitetura operacional estabilizada. Você concluiu o primeiro ciclo."
        };
        render();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }
    }

    function restartJourney() {
      state = createInitialState();
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function fillScaffold() {
      const mission = currentMission();
      const answerBox = document.getElementById("answerBox");

      if (!answerBox) return;

      const current = answerBox.value.trim();

      if (current.length > 0) {
        answerBox.value = current + "\n\n---\n\n" + mission.expected_structure;
      } else {
        answerBox.value = mission.expected_structure;
      }

      state.currentAnswer = answerBox.value;
      answerBox.focus();
    }

    render();
  </script>
</body>
</html>
